apiVersion: kots.io/v1beta2
kind: HelmChart
metadata:
  name: openhands-secrets
spec:
  chart:
    name: openhands-secrets
  namespace: openhands
  releaseName: openhands-secrets
  weight: 1
  helmUpgradeFlags: ["--wait", "--timeout", "600s", "--force-conflicts"]
  values:
    config:
      # Security secrets
      admin_password: '{{repl ConfigOption "admin_password"}}'
      redis_password: '{{repl ConfigOption "redis_password"}}'
      jwt_secret: '{{repl ConfigOption "jwt_secret"}}'
      keycloak_admin_password: '{{repl ConfigOption "keycloak_admin_password"}}'
      keycloak_client_secret: '{{repl ConfigOption "keycloak_client_secret"}}'
      litellm_api_key: '{{repl ConfigOption "litellm_api_key"}}'
      default_api_key: '{{repl ConfigOption "default_api_key"}}'
      sandbox_api_key: '{{repl ConfigOption "default_api_key"}}'

      # Database configuration
      # TODO: is this the correct hostname fallback for embedded postgres?
      postgres_host: '{{repl if ConfigOptionEquals "postgres_type" "external_postgres"}}{{repl ConfigOption "external_postgres_host"}}{{repl else}}oh-main-postgresql{{repl end}}'
      postgres_username: '{{repl if ConfigOptionEquals "postgres_type" "external_postgres"}}{{repl ConfigOption "external_postgres_username"}}{{repl else}}{{repl ConfigOption "postgres_username"}}{{repl end}}'
      postgres_database: '{{repl if ConfigOptionEquals "postgres_type" "external_postgres"}}{{repl ConfigOption "external_postgres_database"}}{{repl else}}{{repl ConfigOption "postgres_database"}}{{repl end}}'
      postgres_password: '{{repl if ConfigOptionEquals "postgres_type" "external_postgres"}}{{repl ConfigOption "external_postgres_password"}}{{repl else}}{{repl ConfigOption "postgres_password"}}{{repl end}}'

      # Keycloak configuration
      keycloak_realm_name: '{{repl ConfigOption "keycloak_realm_name"}}'
      keycloak_client_id: '{{repl ConfigOption "keycloak_client_id"}}'
      keycloak_smtp_password: '{{repl ConfigOption "keycloak_smtp_password"}}'

      # LLM provider secrets
      anthropic_api_key: '{{repl ConfigOption "anthropic_api_key"}}'
      openai_api_key: '{{repl ConfigOption "openai_api_key"}}'
      google_gemini_api_key: '{{repl ConfigOption "google_gemini_api_key"}}'
      google_vertex_project_id: '{{repl ConfigOption "google_vertex_project_id"}}'
      google_vertex_location: '{{repl ConfigOption "google_vertex_location"}}'
      google_vertex_credentials: |
        {{repl ConfigOptionData "google_vertex_credentials" | nindent 8}}
      deepseek_api_key: '{{repl ConfigOption "deepseek_api_key"}}'
      mistral_api_key: '{{repl ConfigOption "mistral_api_key"}}'
      azure_auth_method: '{{repl ConfigOption "azure_auth_method"}}'
      azure_api_key: '{{repl ConfigOption "azure_api_key"}}'
      azure_tenant_id: '{{repl ConfigOption "azure_tenant_id"}}'
      azure_client_id: '{{repl ConfigOption "azure_client_id"}}'
      azure_client_secret: '{{repl ConfigOption "azure_client_secret"}}'
      azure_endpoint: '{{repl ConfigOption "azure_endpoint"}}'
      azure_api_version: '{{repl ConfigOption "azure_api_version"}}'
      azure_deployment_name: '{{repl ConfigOption "azure_deployment_name"}}'
      groq_api_key: '{{repl ConfigOption "groq_api_key"}}'
      openrouter_api_key: '{{repl ConfigOption "openrouter_api_key"}}'
      aws_auth_method: '{{repl ConfigOption "aws_auth_method"}}'
      aws_access_key_id: '{{repl ConfigOption "aws_access_key_id"}}'
      aws_secret_access_key: '{{repl ConfigOption "aws_secret_access_key"}}'
      aws_region_name: '{{repl ConfigOption "aws_region_name"}}'
      bedrock_model_id: '{{repl ConfigOption "bedrock_model_id"}}'
      custom_api_key: '{{repl ConfigOption "custom_api_key"}}'
      custom_base_url: '{{repl ConfigOption "custom_base_url"}}'
      custom_model: '{{repl ConfigOption "custom_model"}}'

      # Bitbucket Data Center secrets
      bitbucket_data_center_domain: '{{repl ConfigOption "bitbucket_data_center_domain"}}'
      bitbucket_data_center_client_id: '{{repl ConfigOption "bitbucket_data_center_client_id"}}'
      bitbucket_data_center_client_secret: '{{repl ConfigOption "bitbucket_data_center_client_secret"}}'

      # GitHub credentials
      github_oauth_client_id: '{{repl ConfigOption "github_oauth_client_id"}}'
      github_oauth_client_secret: '{{repl ConfigOption "github_oauth_client_secret"}}'
      github_app_id: '{{repl ConfigOption "github_app_id"}}'
      github_app_slug: '{{repl ConfigOption "github_app_slug"}}'
      github_app_webhook_secret: '{{repl ConfigOption "github_app_webhook_secret"}}'
      github_app_private_key: |
        {{repl ConfigOptionData "github_app_private_key" | nindent 8}}

      # Plugin Directory secrets
      plugin_directory_identity_shared_secret: '{{repl ConfigOption "plugin_directory_identity_shared_secret"}}'
      plugin_directory_session_secret: '{{repl ConfigOption "plugin_directory_session_secret"}}'

      # GitLab credentials
      gitlab_oauth_client_id: '{{repl ConfigOption "gitlab_oauth_client_id"}}'
      gitlab_oauth_client_secret: '{{repl ConfigOption "gitlab_oauth_client_secret"}}'

      # Slack credentials
      slack_client_id: '{{repl ConfigOption "slack_client_id"}}'
      slack_client_secret: '{{repl ConfigOption "slack_client_secret"}}'
      slack_signing_secret: '{{repl ConfigOption "slack_signing_secret"}}'

      # TLS certificates
      tls_certificate: |
        {{repl ConfigOptionData "tls_certificate" | nindent 8}}
      tls_private_key: |
        {{repl ConfigOptionData "tls_private_key" | nindent 8}}
      tls_ca_certificate: |
        {{repl ConfigOptionData "tls_ca_certificate" | nindent 8}}
      wildcard-tls-cert: |
        {{repl ConfigOptionData "tls_certificate" | nindent 8}}
      tls_env: '{{repl Namespace }}'
      auth_hostname: '{{repl if ConfigOptionEquals "hostname_mode" "derive"}}auth.{{repl ConfigOption "base_domain"}}{{repl else}}{{repl ConfigOption "auth_hostname"}}{{repl end}}'

  optionalValues:
    - when: '{{repl ConfigOptionEquals "automations_enabled" "1" }}'
      recursiveMerge: true
      values:
        automation:
          enabled: true
        config:
          automation_service_key: '{{repl ConfigOption "automation_service_key"}}'
          automation_webhook_secret: '{{repl ConfigOption "automation_webhook_secret"}}'
