apiVersion: kots.io/v1beta1
kind: Config
metadata:
  name: openhands-config
spec:
  groups:
    - name: domain_configuration
      title: Domain Configuration
      description: Configure hostnames and domains for OpenHands services
      items:
        - name: hostname_mode
          title: Hostname Configuration Mode
          help_text: Choose how to configure hostnames for OpenHands services
          type: select_one
          default: "derive"
          items:
            - name: "derive"
              title: "Derive hostnames from domain (recommended)"
            - name: "custom"
              title: "Enter all hostnames manually"
        # Workaround for not being able to template the value of `readonly`
        - name: base_domain
          title: Base Domain
          help_text: The base domain for OpenHands services (e.g., example.com)
          type: text
          readonly: false
          when: 'repl{{ ConfigOptionEquals "hostname_mode" "derive" }}'
          required: true
        - name: app_hostname
          title: Application Hostname
          help_text: The hostname where OpenHands will be accessible
          type: text
          default: "app.example.com"
          when: 'repl{{ ConfigOptionEquals "hostname_mode" "custom" }}'
          required: true
        - name: analytics_hostname
          title: Analytics Hostname
          help_text: The hostname for the Analytics service
          type: text
          default: "analytics.example.com"
          when: 'repl{{ ConfigOptionEquals "hostname_mode" "custom" }}'
          required: true
        - name: auth_hostname
          title: Authentication Hostname
          help_text: The hostname for Keycloak authentication service
          type: text
          default: "auth.app.example.com"
          when: 'repl{{ ConfigOptionEquals "hostname_mode" "custom" }}'
          required: true
        - name: llm_proxy_hostname
          title: LLM Proxy Hostname
          help_text: The hostname for the LiteLLM proxy service
          type: text
          default: "llm-proxy.example.com"
          when: 'repl{{ ConfigOptionEquals "hostname_mode" "custom" }}'
          required: true
        - name: runtime_api_hostname
          title: Runtime API Hostname
          help_text: The hostname for the Runtime API service
          type: text
          default: "runtime-api.example.com"
          when: 'repl{{ ConfigOptionEquals "hostname_mode" "custom" }}'
        - name: runtime_base_hostname
          title: Runtime Base Hostname
          help_text: The base hostname for runtime containers
          type: text
          default: "runtime.example.com"
          when: 'repl{{ ConfigOptionEquals "hostname_mode" "custom" }}'

    - name: tls_configuration
      title: Certificate Configuration
      description: Configure TLS certificates for secure HTTPS connections
      items:
        - name: tls_certificate
          title: TLS Certificate
          help_text: Upload your TLS certificate file (.crt or .pem)
          type: file
          required: true
        - name: tls_private_key
          title: TLS Private Key
          help_text: Upload your TLS private key file (.key or .pem)
          type: file
          required: true
        - name: tls_ca_certificate
          title: Additional Trusted CA Certificates
          help_text: Upload a root CA certificate in PEM format. Concatenate multiple PEM-encoded certificates in the same file to add them all to the cluster's default trust store. If the TLS certificate provided above is self-signed, include the CA that signed it here so components inside the cluster can validate it.
          type: file
          required: false
          recommended: true

    - name: llm_configuration
      title: LLM Configuration
      description: Configure your Large Language Model provider
      items:
        - name: llm_provider
          title: LLM Provider
          help_text: Choose your Large Language Model provider
          type: dropdown
          default: "anthropic"
          items:
            - name: "anthropic"
              title: "Anthropic (Claude)"
            - name: "openai"
              title: "OpenAI (GPT)"
            - name: "google"
              title: "Google"
            - name: "deepseek"
              title: "DeepSeek"
            - name: "mistral"
              title: "Mistral AI"
            - name: "azure"
              title: "Azure"
            - name: "groq"
              title: "Groq"
            - name: "openrouter"
              title: "OpenRouter"
            - name: "bedrock"
              title: "AWS Bedrock"
            - name: "custom"
              title: "Custom/Local LLM"
        - name: anthropic_api_key
          title: Anthropic API Key
          help_text: Your Anthropic API key for Claude models
          type: password
          when: 'repl{{ ConfigOptionEquals "llm_provider" "anthropic" }}'
          required: true
        - name: openai_api_key
          title: OpenAI API Key
          help_text: Your OpenAI API key for GPT models
          type: password
          when: 'repl{{ ConfigOptionEquals "llm_provider" "openai" }}'
          required: true
        - name: google_api_type
          title: Google API Type
          help_text: Choose between Google AI Studio (Gemini API) or Google Cloud Platform (Vertex AI)
          type: select_one
          default: "gemini"
          when: 'repl{{ ConfigOptionEquals "llm_provider" "google" }}'
          items:
            - name: "gemini"
              title: "Google AI Studio (Gemini API)"
            - name: "vertex"
              title: "Google Cloud Platform (Vertex AI)"
        - name: google_gemini_api_key
          title: Google Gemini API Key
          help_text: Your Google AI Studio API key for Gemini models
          type: password
          when: 'repl{{ and (ConfigOptionEquals "llm_provider" "google") (ConfigOptionEquals "google_api_type" "gemini") }}'
          required: true
        - name: google_vertex_project_id
          title: Google Cloud Project ID
          help_text: Your Google Cloud Platform project ID for Vertex AI
          type: text
          when: 'repl{{ and (ConfigOptionEquals "llm_provider" "google") (ConfigOptionEquals "google_api_type" "vertex") }}'
          required: true
        - name: google_vertex_location
          title: Google Cloud Location
          help_text: Your Google Cloud Platform location/region for Vertex AI
          type: text
          default: "us-central1"
          when: 'repl{{ and (ConfigOptionEquals "llm_provider" "google") (ConfigOptionEquals "google_api_type" "vertex") }}'
          required: true
        - name: google_vertex_credentials
          title: Google Cloud Service Account JSON file
          help_text: Upload your Google Cloud service account credentials JSON file (downloaded from GCP Console)
          type: file
          when: 'repl{{ and (ConfigOptionEquals "llm_provider" "google") (ConfigOptionEquals "google_api_type" "vertex") }}'
          required: true
        - name: deepseek_api_key
          title: DeepSeek API Key
          help_text: Your DeepSeek API key
          type: password
          when: 'repl{{ ConfigOptionEquals "llm_provider" "deepseek" }}'
          required: true
        - name: mistral_api_key
          title: Mistral API Key
          help_text: Your Mistral AI API key
          type: password
          when: 'repl{{ ConfigOptionEquals "llm_provider" "mistral" }}'
          required: true
        - name: azure_auth_method
          title: Azure Authentication Method
          help_text: Authentication method for Azure OpenAI. Service Principal (Microsoft Entra ID) is recommended for production.
          type: select_one
          default: "api_key"
          when: 'repl{{ ConfigOptionEquals "llm_provider" "azure" }}'
          required: true
          items:
            - name: "api_key"
              title: "API Key"
            - name: "service_principal"
              title: "Microsoft Entra ID — Service Principal"
        - name: azure_api_key
          title: Azure OpenAI API Key
          help_text: Your Azure OpenAI API key
          type: password
          when: 'repl{{ and (ConfigOptionEquals "llm_provider" "azure") (ConfigOptionEquals "azure_auth_method" "api_key") }}'
          required: true
        - name: azure_tenant_id
          title: Microsoft Entra Tenant ID
          help_text: The Microsoft Entra directory (tenant) ID (under Microsoft Entra ID → Overview in the Azure portal).
          type: text
          when: 'repl{{ and (ConfigOptionEquals "llm_provider" "azure") (ConfigOptionEquals "azure_auth_method" "service_principal") }}'
          required: true
        - name: azure_client_id
          title: Microsoft Entra Application (Client) ID
          help_text: The Application (client) ID of the Entra app registration. Grant it the "Cognitive Services OpenAI User" role on your Azure OpenAI resource.
          type: text
          when: 'repl{{ and (ConfigOptionEquals "llm_provider" "azure") (ConfigOptionEquals "azure_auth_method" "service_principal") }}'
          required: true
        - name: azure_client_secret
          title: Microsoft Entra Client Secret
          help_text: The client secret for the Entra ID app registration.
          type: password
          when: 'repl{{ and (ConfigOptionEquals "llm_provider" "azure") (ConfigOptionEquals "azure_auth_method" "service_principal") }}'
          required: true
        - name: azure_endpoint
          title: Azure OpenAI Endpoint
          help_text: Your Azure OpenAI endpoint URL (e.g., https://my-resource.openai.azure.com). Regional endpoints (e.g., https://eastus2.api.cognitive.microsoft.com) only work with API Key auth, not Microsoft Entra ID.
          type: text
          when: 'repl{{ ConfigOptionEquals "llm_provider" "azure" }}'
          required: true
        - name: azure_api_version
          title: Azure OpenAI API Version
          help_text: The API version for your Azure OpenAI deployment
          type: text
          default: "2024-10-21"
          when: 'repl{{ ConfigOptionEquals "llm_provider" "azure" }}'
          required: true
        - name: azure_deployment_name
          title: Azure OpenAI Deployment Name
          help_text: The name of your Azure OpenAI model deployment (set when you deployed the model in Azure)
          type: text
          when: 'repl{{ ConfigOptionEquals "llm_provider" "azure" }}'
          required: true
        - name: groq_api_key
          title: Groq API Key
          help_text: Your Groq API key
          type: password
          when: 'repl{{ ConfigOptionEquals "llm_provider" "groq" }}'
          required: true
        - name: openrouter_api_key
          title: OpenRouter API Key
          help_text: Your OpenRouter API key
          type: password
          when: 'repl{{ ConfigOptionEquals "llm_provider" "openrouter" }}'
          required: true
        - name: aws_auth_method
          title: AWS Authentication Method
          help_text: How LiteLLM authenticates to AWS Bedrock. "EC2 Instance Profile" requires OpenHands to be running on an EC2 instance with an attached IAM role that has bedrock:InvokeModel* permissions. In containerized deployments, the EC2 instance metadata service hop limit must be at least 2 so pods can reach IMDS.
          type: select_one
          default: "static_keys"
          when: 'repl{{ ConfigOptionEquals "llm_provider" "bedrock" }}'
          required: true
          items:
            - name: "static_keys"
              title: "Access Key + Secret"
            - name: "instance_profile"
              title: "EC2 Instance Profile"
        - name: aws_access_key_id
          title: AWS Access Key ID
          help_text: AWS access key with bedrock:InvokeModel and bedrock:InvokeModelWithResponseStream permissions.
          type: text
          when: 'repl{{ and (ConfigOptionEquals "llm_provider" "bedrock") (ConfigOptionEquals "aws_auth_method" "static_keys") }}'
          required: true
        - name: aws_secret_access_key
          title: AWS Secret Access Key
          help_text: Secret access key paired with the AWS Access Key ID above.
          type: password
          when: 'repl{{ and (ConfigOptionEquals "llm_provider" "bedrock") (ConfigOptionEquals "aws_auth_method" "static_keys") }}'
          required: true
        - name: aws_region_name
          title: AWS Region
          help_text: AWS region where Bedrock model access has been granted (e.g., us-west-2, us-east-1). Cross-region inference profile IDs (us.anthropic.*) work in any US region.
          type: text
          default: "us-west-2"
          when: 'repl{{ ConfigOptionEquals "llm_provider" "bedrock" }}'
          required: true
        - name: bedrock_model_id
          title: Bedrock Model ID
          help_text: Bedrock model ID or cross-region inference profile ID. Cross-region profiles (prefix `us.`) work in any US region; standard model IDs are region-specific. Most current Claude models on Bedrock are inference-profile only (e.g., `us.anthropic.claude-sonnet-4-5-20250929-v1:0`).
          type: text
          default: "us.anthropic.claude-sonnet-4-5-20250929-v1:0"
          when: 'repl{{ ConfigOptionEquals "llm_provider" "bedrock" }}'
          required: true
        - name: custom_base_url
          title: Custom LLM Base URL
          help_text: Base URL of your OpenAI-compatible LLM endpoint (e.g., https://openrouter.ai/api/v1, http://my-vllm:8000/v1)
          type: text
          when: 'repl{{ ConfigOptionEquals "llm_provider" "custom" }}'
          required: true
        - name: custom_api_key
          title: Custom LLM API Key
          help_text: API key for your custom LLM (if required)
          type: password
          when: 'repl{{ ConfigOptionEquals "llm_provider" "custom" }}'
          required: false
        - name: custom_model
          title: Custom LLM Model Name
          help_text: Model identifier as accepted by the endpoint (e.g., anthropic/claude-sonnet-4-5 for OpenRouter, llama-3.1-70b-instruct for vLLM)
          type: text
          when: 'repl{{ ConfigOptionEquals "llm_provider" "custom" }}'
          required: true

    - name: security_secrets
      title: Security & Authentication
      description: Configure passwords and secrets for various services
      when: false
      items:
        - name: admin_password
          title: Admin Password
          help_text: Admin password for Runtime API
          type: password
          hidden: true
        - name: postgres_username
          title: PostgreSQL Username
          help_text: Username for embedded PostgreSQL database
          type: text
          hidden: true
          default: "postgres"
        - name: postgres_database
          title: PostgreSQL Database Name
          help_text: Database name for embedded PostgreSQL
          type: text
          hidden: true
          default: "openhands"
        - name: postgres_password
          title: PostgreSQL Password
          help_text: Password for embedded PostgreSQL database
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: redis_password
          title: Redis Password
          help_text: Password for embedded Redis
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: jwt_secret
          title: JWT Secret
          help_text: Secret key for JWT token generation
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: keycloak_admin_password
          title: Keycloak Admin Password
          help_text: Admin password for Keycloak
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: keycloak_client_secret
          title: Keycloak Client Secret
          help_text: OAuth client secret for Keycloak
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: litellm_api_key
          title: LiteLLM API Key
          help_text: API key for LiteLLM service
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: default_api_key
          title: Default API Key
          help_text: Default API key for OpenHands
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: sandbox_api_key
          title: Sandbox API Key
          help_text: API key for sandbox access
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: keycloak_realm_name
          title: Keycloak Realm Name
          help_text: Name of the Keycloak realm
          type: text
          default: "allhands"
        - name: keycloak_client_id
          title: Keycloak Client ID
          help_text: OAuth client ID for Keycloak
          type: text
          default: "allhands"
        - name: keycloak_smtp_password
          title: Keycloak SMTP Password
          help_text: SMTP password for Keycloak email services
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: plugin_directory_identity_shared_secret
          title: Plugin Directory Identity Shared Secret
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: plugin_directory_session_secret
          title: Plugin Directory Session Secret
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: automation_service_key
          title: Automation Service Key
          help_text: Secret key for the automation service
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'
        - name: automation_webhook_secret
          title: Automation Webhook Secret
          help_text: Secret for validating automation webhooks
          type: password
          hidden: true
          value: '{{repl RandomString 32}}'

    - name: bitbucket_data_center_authentication
      title: Bitbucket Data Center Authentication
      description: Configure Bitbucket Data Center OAuth for user authentication
      items:
        - name: bitbucket_data_center_auth_enabled
          title: Enable Bitbucket Data Center Authentication
          help_text: Enable Bitbucket Data Center OAuth for user authentication
          type: bool
          default: "0"
        - name: bitbucket_data_center_domain
          title: Bitbucket Data Center Domain
          help_text: Domain of your Bitbucket Data Center instance
          type: text
          when: 'repl{{ ConfigOptionEquals "bitbucket_data_center_auth_enabled" "1" }}'
          required: true
        - name: bitbucket_data_center_client_id
          title: Bitbucket Data Center Client ID
          help_text: Client ID from your Bitbucket Data Center OAuth App
          type: text
          when: 'repl{{ ConfigOptionEquals "bitbucket_data_center_auth_enabled" "1" }}'
          required: true
        - name: bitbucket_data_center_client_secret
          title: Bitbucket Data Center Client Secret
          help_text: Client Secret from your Bitbucket Data Center OAuth App
          type: password
          when: 'repl{{ ConfigOptionEquals "bitbucket_data_center_auth_enabled" "1" }}'
          required: true

    - name: github_authentication
      title: GitHub Authentication
      description: Configure GitHub App integration for user authentication. Note that this is a GitHub App and NOT a GitHub OAuth app.
      items:
        - name: github_auth_enabled
          title: Enable GitHub Authentication
          help_text: Enable GitHub App authentication for user sign-in
          type: bool
          default: "0"
        - name: github_oauth_client_id
          title: GitHub App Client ID
          help_text: Client ID from your GitHub App
          type: text
          when: 'repl{{ ConfigOptionEquals "github_auth_enabled" "1" }}'
          required: true
        - name: github_oauth_client_secret
          title: GitHub App Client Secret
          help_text: Client Secret from your GitHub App
          type: password
          when: 'repl{{ ConfigOptionEquals "github_auth_enabled" "1" }}'
          required: true
        - name: github_app_id
          title: GitHub App ID
          help_text: App ID from your GitHub App (for repository integration)
          type: text
          when: 'repl{{ ConfigOptionEquals "github_auth_enabled" "1" }}'
          required: true
          validation:
            regex:
              pattern: ^[0-9]+$
              message: Must be a numeric value
        - name: github_app_slug
          title: GitHub App Slug
          help_text: Slug of your GitHub App (the human-readable identifier in the app's URL)
          type: text
          when: 'repl{{ ConfigOptionEquals "github_auth_enabled" "1" }}'
          required: true
        - name: github_app_webhook_secret
          title: GitHub App Webhook Secret
          help_text: Webhook secret from your GitHub App
          type: password
          when: 'repl{{ ConfigOptionEquals "github_auth_enabled" "1" }}'
          required: true
        - name: github_app_private_key
          title: GitHub App Private Key
          help_text: Upload the private key file (.pem) from your GitHub App
          type: file
          when: 'repl{{ ConfigOptionEquals "github_auth_enabled" "1" }}'
          required: true

    - name: gitlab_authentication
      title: GitLab Authentication
      description: Configure GitLab OAuth and App integration for user authentication
      items:
        - name: gitlab_auth_enabled
          title: Enable GitLab Authentication
          help_text: Enable GitLab OAuth for user authentication
          type: bool
          default: "0"
        - name: gitlab_host
          title: GitLab Host
          help_text: Hostname of your GitLab instance (e.g. gitlab.example.com). Leave blank to use gitlab.com.
          type: text
          default: "gitlab.com"
          when: 'repl{{ ConfigOptionEquals "gitlab_auth_enabled" "1" }}'
        - name: gitlab_oauth_client_id
          title: GitLab OAuth Client ID
          help_text: Client ID from your GitLab OAuth App
          type: text
          when: 'repl{{ ConfigOptionEquals "gitlab_auth_enabled" "1" }}'
          required: true
        - name: gitlab_oauth_client_secret
          title: GitLab OAuth Client Secret
          help_text: Client Secret from your GitLab OAuth App
          type: password
          when: 'repl{{ ConfigOptionEquals "gitlab_auth_enabled" "1" }}'
          required: true

    - name: slack_configuration
      title: Enable Slack
      description: Enable Slack
      items:
        - name: slack_enabled
          title: Enable Slack Integration
          help_text: Configure to allow the use of @OpenHands in Slack
          type: bool
          default: "0"
        - name: slack_client_id
          title: Slack Client ID
          help_text: Client ID from your Slack App
          type: text
          when: 'repl{{ ConfigOptionEquals "slack_enabled" "1" }}'
          required: true
        - name: slack_client_secret
          title: Slack Client Secret
          help_text: Client Secret from your Slack App
          type: password
          when: 'repl{{ ConfigOptionEquals "slack_enabled" "1" }}'
          required: true
        - name: slack_signing_secret
          title: Slack Signing Secret
          help_text: Signing Secret from your Slack App
          type: password
          when: 'repl{{ ConfigOptionEquals "slack_enabled" "1" }}'
          required: true

    - name: database_configuration
      title: Database Configuration
      description: Configure PostgreSQL database settings
      items:
        - name: postgres_type
          title: PostgreSQL Type
          help_text: Choose between embedded PostgreSQL or external PostgreSQL
          type: select_one
          default: "embedded_postgres"
          items:
            - name: "embedded_postgres"
              title: "Embedded PostgreSQL"
            - name: "external_postgres"
              title: "External PostgreSQL"
        - name: external_postgres_host
          title: External PostgreSQL Host
          help_text: Hostname or IP address of your external PostgreSQL server
          type: text
          when: 'repl{{ ConfigOptionEquals "postgres_type" "external_postgres" }}'
          required: true
        - name: external_postgres_port
          title: External PostgreSQL Port
          help_text: Port number for your external PostgreSQL server
          type: text
          default: "5432"
          when: 'repl{{ ConfigOptionEquals "postgres_type" "external_postgres" }}'
        - name: external_postgres_username
          title: External PostgreSQL Username
          help_text: Username for connecting to your external PostgreSQL server
          type: text
          when: 'repl{{ ConfigOptionEquals "postgres_type" "external_postgres" }}'
          required: true
        - name: external_postgres_password
          title: External PostgreSQL Password
          help_text: Password for connecting to your external PostgreSQL server
          type: password
          when: 'repl{{ ConfigOptionEquals "postgres_type" "external_postgres" }}'
          required: true
        - name: external_postgres_create_databases
          title: Create Databases Automatically
          help_text: Automatically create databases on startup if they don't exist. Requires the configured user to have CREATE privileges.
          type: bool
          default: "1"
          when: 'repl{{ ConfigOptionEquals "postgres_type" "external_postgres" }}'

    - name: database_names
      title: Database Names
      description: Configure the names of the databases that will be created automatically, or set the names to match existing databases you have already provisioned. We recommend using the default values.
      when: 'repl{{ ConfigOptionEquals "postgres_type" "external_postgres" }}'
      items:
        - name: external_postgres_database
          title: OpenHands Database
          help_text: Database name for OpenHands
          type: text
          default: "openhands"
        - name: external_postgres_keycloak_database
          title: Keycloak Database
          help_text: Database name for Keycloak authentication
          type: text
          default: "bitnami_keycloak"
        - name: external_postgres_litellm_database
          title: LiteLLM Database
          help_text: Database name for the LiteLLM proxy
          type: text
          default: "litellm"
        - name: external_postgres_runtime_api_database
          title: Runtime API Database
          help_text: Database name for the Runtime API
          type: text
          default: "runtime_api_db"

    - name: sandbox_configuration
      title: Sandbox Configuration
      description: OpenHands conversations run in isolated sandboxes. Configure sandbox resources and lifecycle settings here. Adjust these settings based on your expected workload and the size of your cluster.
      items:
        - name: runtime_routing_mode
          title: Sandbox Routing Mode
          help_text: |
            How sandbox URLs are constructed.
            Subdomain routes each sandbox at `{id}.{runtime_base}`. The uploaded TLS cert must have a SAN for `*.{runtime_base}`.
            Path-based routes every sandbox at `{runtime_base}/{id}`. The uploaded TLS cert must have a SAN for `{runtime_base}`.
          type: select_one
          default: "subdomain"
          items:
            - name: "subdomain"
              title: "Subdomain"
            - name: "path"
              title: "Path-based"
        - name: sandbox_idle_seconds
          title: Idle Time (seconds)
          help_text: How long (in seconds) before idle conversations are paused. Pausing a conversation frees up memory and CPU resources.
          type: text
          default: "3600"
          validation:
            regex:
              pattern: ^[1-9][0-9]*$
              message: Must be a positive integer (in seconds)
        - name: sandbox_dead_seconds
          title: Deletion Time (seconds)
          help_text: How long (in seconds) before paused conversations are permanently deleted. Once deleted, the conversation's storage is freed and it can no longer be accessed.
          type: text
          default: "86400"
          validation:
            regex:
              pattern: ^[1-9][0-9]*$
              message: Must be a positive integer (in seconds)
        - name: sandbox_storage_size
          title: Storage Size
          help_text: How much persistent storage each sandbox gets.
          type: text
          default: "10240Mi"
          validation:
            regex:
              pattern: ^[1-9][0-9]*Mi$
              message: Must be a size in Mi (e.g., 10240Mi)
        - name: sandbox_memory_request
          title: Memory Request
          help_text: The minimum amount of memory to reserve for each sandbox.
          type: text
          default: "100Mi"
          validation:
            regex:
              pattern: ^[1-9][0-9]*Mi$
              message: Must be a size in Mi (e.g., 1024Mi)
        - name: sandbox_memory_limit
          title: Memory Limit
          help_text: The maximum amount of memory a sandbox can use. If exceeded, the sandbox may be terminated to free up resources.
          type: text
          default: "2048Mi"
          validation:
            regex:
              pattern: ^[1-9][0-9]*Mi$
              message: Must be a size in Mi (e.g., 2048Mi)
        - name: sandbox_cpu_request
          title: CPU Request
          help_text: The minimum amount of CPU to reserve for each sandbox.
          type: text
          default: "100m"
          validation:
            regex:
              pattern: ^[1-9][0-9]*m$
              message: Must be a CPU value in millicores (e.g., 100m, 500m)
        - name: sandbox_cpu_limit
          title: CPU Limit
          help_text: The maximum amount of CPU a sandbox can use. If exceeded, the sandbox may be throttled.
          type: text
          default: "1000m"
          validation:
            regex:
              pattern: ^[1-9][0-9]*m$
              message: Must be a CPU value in millicores (e.g., 500m, 1000m)
        - name: sandbox_warm_runtime_count
          title: Warm Runtime Count
          help_text: Number of warm runtime sandboxes to keep ready so new conversations start instantly. Set to 0 to disable and cold-start each sandbox.
          type: text
          default: "1"
          validation:
            regex:
              pattern: ^(0|[1-9][0-9]*)$
              message: Must be a non-negative integer

    - name: proxy_configuration
      title: Proxy Configuration
      description: Configure HTTP proxy settings for outbound connections
      items:
        - name: proxy_enabled
          title: Enable HTTP Proxy
          help_text: Enable HTTP proxy for outbound connections
          type: bool
          default: "0"
        - name: http_proxy
          title: HTTP_PROXY
          help_text: HTTP proxy URL (e.g., http://proxy.example.com:8080)
          type: text
          when: 'repl{{ ConfigOptionEquals "proxy_enabled" "1" }}'
        - name: https_proxy
          title: HTTPS_PROXY
          help_text: HTTPS proxy URL (e.g., http://proxy.example.com:8080)
          type: text
          when: 'repl{{ ConfigOptionEquals "proxy_enabled" "1" }}'
        - name: no_proxy
          title: NO_PROXY
          help_text: Additional hosts to bypass the proxy, in comma-delimited format with no leading dot (e.g., example.com,internal.corp). Each entry matches the domain and all its subdomains — login.example.com matches login.example.com and subdomain.login.example.com, but not app.example.com. Internal services and configured domain hostnames are automatically included.
          type: text
          when: 'repl{{ ConfigOptionEquals "proxy_enabled" "1" }}'
        - name: ssl_verify
          title: SSL Verification
          help_text: Enable SSL certificate verification for outbound connections. Disable if using a proxy with a self-signed certificate.
          type: bool
          default: "1"
          when: 'repl{{ ConfigOptionEquals "proxy_enabled" "1" }}'

    - name: troubleshooting
      title: Troubleshooting
      description: Options to help diagnose issues with your OpenHands installation
      items:
        - name: log_level
          title: Log Level
          help_text: Set the server log level. DEBUG produces significantly more log output and should only be used when troubleshooting issues.
          type: select_one
          default: "INFO"
          items:
            - name: "INFO"
              title: "Info (default)"
            - name: "DEBUG"
              title: "Debug"

    - name: experimental
      title: Experimental
      description: Preview features that are still in development. Enable at your own risk.
      items:
        - name: plugin_directory_enabled
          title: Enable Plugin Directory
          help_text: Deploy the Plugin Directory marketplace, accessible at /plugins on your application hostname.
          type: bool
          default: "0"
        - name: plugin_directory_marketplace_source
          title: Marketplace Source
          help_text: "URI of the plugin catalog to load. Supports github://owner/repo[@ref], or http(s):// URLs to a catalog JSON file."
          type: text
          when: 'repl{{ ConfigOptionEquals "plugin_directory_enabled" "1" }}'
          required: true
          validation:
            regex:
              pattern: ^(github|https?)://
              message: Must start with github://, https://, or http://

    - name: analytics_configuration
      title: Analytics Configuration
      description: Configure LLM observability and tracing with Laminar
      items:
        - name: analytics_enabled
          title: Enable Analytics
          help_text: Enable analytics for LLM observability and tracing
          type: bool
          default: "0"
        - name: laminar_project_api_key
          title: Laminar Project API Key
          help_text: |
            Your Laminar project API key. After enabling analytics and logging in to your Laminar instance via Keycloak, create a project API key in the Laminar UI. Ingest-only keys are strongly recommended — they are write-only and have no read access, which is more secure than default project API keys.
          type: password
          when: 'repl{{ ConfigOptionEquals "analytics_enabled" "1" }}'
          required: false

    - name: advanced_options
      title: Advanced Options
      description: Optional components and advanced configuration settings
      items:
        - name: automations_enabled
          title: Enable Automations
          help_text: Deploy the Automations UI and backend. If you use an external PostgreSQL instance, make sure the automations database requirements are satisfied before enabling this option.
          type: bool
          default: "0"
