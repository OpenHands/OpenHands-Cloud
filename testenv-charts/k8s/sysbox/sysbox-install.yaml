# =============================================================================
# Sysbox Installation for GKE
# =============================================================================
# This manifest installs sysbox-runc on nodes labeled with sysbox-install=yes.
# Sysbox enables secure, rootless container-in-container execution for
# OpenHands runtime pods.
#
# Prerequisites:
# - Nodes must be labeled: sysbox-install=yes
# - Nodes should be tainted: sysbox-runtime=true:NoSchedule
# - Ubuntu-based GKE nodes (Container-Optimized OS not supported)
#
# Usage:
#   kubectl apply -f sysbox-install.yaml
#
# After installation, the sysbox-runc RuntimeClass will be available for pods.
# =============================================================================

---
# RuntimeClass for sysbox-runc
# Pods that need container-in-container support should use this runtime
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: sysbox-runc
handler: sysbox-runc

---
# Namespace for sysbox components
apiVersion: v1
kind: Namespace
metadata:
  name: sysbox
  labels:
    app.kubernetes.io/name: sysbox
    app.kubernetes.io/component: runtime

---
# ServiceAccount for sysbox installer
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sysbox-installer
  namespace: sysbox

---
# DaemonSet to install sysbox on labeled nodes
# This runs as a privileged init container to install sysbox binaries,
# then sleeps to keep the pod running (for status visibility)
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: sysbox-installer
  namespace: sysbox
  labels:
    app.kubernetes.io/name: sysbox
    app.kubernetes.io/component: installer
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: sysbox-installer
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sysbox-installer
    spec:
      serviceAccountName: sysbox-installer
      hostPID: true
      hostNetwork: true
      # Only run on nodes labeled for sysbox
      nodeSelector:
        sysbox-install: "yes"
      # Tolerate the sysbox-runtime taint
      tolerations:
        - key: "sysbox-runtime"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      initContainers:
        - name: sysbox-installer
          # v0.6.7 adds support for Ubuntu 24.04 (Noble Numbat) and K8s v1.32
          image: ghcr.io/nestybox/sysbox-deploy-k8s:v0.6.7-0
          imagePullPolicy: Always
          command: ["/opt/sysbox/scripts/sysbox-deploy-k8s.sh", "install"]
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-etc
              mountPath: /mnt/host/etc
            - name: host-osrelease
              mountPath: /mnt/host/os-release
              readOnly: true
            - name: host-dbus
              mountPath: /var/run/dbus
            - name: host-run-systemd
              mountPath: /run/systemd
            - name: host-lib-systemd
              mountPath: /mnt/host/lib/systemd/system
            - name: host-etc-systemd
              mountPath: /mnt/host/etc/systemd/system
            - name: host-usr-local
              mountPath: /mnt/host/usr/local
            - name: host-usr-bin
              mountPath: /mnt/host/usr/bin
            - name: host-var-lib
              mountPath: /mnt/host/var/lib
            - name: host-opt-lib
              mountPath: /mnt/host/opt/lib
            - name: host-run-containerd
              mountPath: /mnt/host/run/containerd
            - name: host-run-k3s
              mountPath: /mnt/host/run/k3s
            - name: host-etc-containerd
              mountPath: /mnt/host/etc/containerd
            - name: host-etc-crio
              mountPath: /mnt/host/etc/crio
            - name: host-etc-rancher
              mountPath: /mnt/host/etc/rancher
            - name: host-var-lib-rancher
              mountPath: /mnt/host/var/lib/rancher
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
      containers:
        # Main container just sleeps to keep the pod running
        # This allows visibility into which nodes have sysbox installed
        - name: sysbox-status
          image: busybox:1.36
          command: ["sh", "-c", "echo 'Sysbox installed successfully on node'; sleep infinity"]
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 10m
              memory: 32Mi
      volumes:
        - name: host-etc
          hostPath:
            path: /etc
        - name: host-osrelease
          hostPath:
            path: /etc/os-release
        - name: host-dbus
          hostPath:
            path: /var/run/dbus
        - name: host-run-systemd
          hostPath:
            path: /run/systemd
        - name: host-lib-systemd
          hostPath:
            path: /lib/systemd/system
        - name: host-etc-systemd
          hostPath:
            path: /etc/systemd/system
        - name: host-usr-local
          hostPath:
            path: /usr/local
        - name: host-usr-bin
          hostPath:
            path: /usr/bin
        - name: host-var-lib
          hostPath:
            path: /var/lib
        - name: host-opt-lib
          hostPath:
            path: /opt/lib
        - name: host-run-containerd
          hostPath:
            path: /run/containerd
        - name: host-run-k3s
          hostPath:
            path: /run/k3s
        - name: host-etc-containerd
          hostPath:
            path: /etc/containerd
        - name: host-etc-crio
          hostPath:
            path: /etc/crio
        - name: host-etc-rancher
          hostPath:
            path: /etc/rancher
        - name: host-var-lib-rancher
          hostPath:
            path: /var/lib/rancher
