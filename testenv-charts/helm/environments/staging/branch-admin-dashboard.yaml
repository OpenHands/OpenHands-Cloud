# =============================================================================
# Branch deployment: admin-dashboard
# Testing: OpenHands/OpenHands PR #14846 - Organization Conversation Admin Dashboard
# Generated by create-branch-deployment.sh on 2026-06-16T18:31:11Z
# =============================================================================
# This file overrides base-values.yaml for the admin-dashboard branch deployment
# Uses shared infrastructure from the 'openhands' namespace (PostgreSQL, Redis, LiteLLM)
#
# PR Under Test:
#   https://github.com/OpenHands/OpenHands/pull/14846
#   Branch: feature/org-conversation-admin-dashboard
#   Features:
#     - Organization-level admin dashboard for viewing/managing conversations
#     - New endpoints: GET/POST /{org_id}/conversations, /stats, /export
#     - KPI dashboard, filtering, sorting, CSV export
#
# Deploy with:
#   helm upgrade --install openhands-admin-dashboard ./charts/openhands \
#     -f testenv-charts/helm/environments/staging/base-values.yaml \
#     -f testenv-charts/helm/environments/staging/branch-admin-dashboard.yaml \
#     -n openhands-admin-dashboard --create-namespace
#
# Prerequisites:
#   1. Create namespace: kubectl create namespace openhands-admin-dashboard
#   2. Copy secrets from openhands namespace:
#      for secret in ghcr-login-secret postgres-password redis keycloak-admin openhands-api-key; do
#        kubectl get secret $secret -n openhands -o yaml | \
#          sed "s/namespace: openhands/namespace: openhands-admin-dashboard/" | \
#          kubectl apply -f -
#      done
#
# IMPORTANT: Runtime DNS Configuration
# =============================================================================
# The runtime-api MUST be configured with the correct RUNTIME_BASE_URL that matches
# the wildcard DNS zone for the staging environment. This is critical for sandbox
# health checks to work properly.
#
# Required: RUNTIME_BASE_URL must be "runtime.ohe-staging.platform-team.all-hands.dev"
# - This MUST match the wildcard DNS zone (*.runtime.ohe-staging.platform-team.all-hands.dev)
# - The runtime-api uses this to construct sandbox ingress hostnames
# - The check_alive_with_ingress() function needs to resolve these URLs from within
#   the cluster to verify sandbox health
#
# DO NOT use the default "runtime.all-hands.dev" - that DNS zone has no wildcard
# entry and sandbox health checks will fail with DNS resolution errors.
#
# Shared DNS Architecture:
# - All branch deployments share the same wildcard DNS: *.runtime.ohe-staging.platform-team.all-hands.dev
# - Traefik routes traffic based on hostname, so different sandbox subdomains route
#   to different sandbox pods in their respective namespaces
# =============================================================================
#
# Seed Test Data (after deployment):
#   # Port-forward to PostgreSQL
#   kubectl port-forward svc/openhands-postgresql -n openhands 5432:5432 &
#
#   # Clone OpenHands repo and run seed script from PR #14846
#   git clone https://github.com/OpenHands/OpenHands.git /tmp/openhands-seed
#   cd /tmp/openhands-seed
#   git fetch origin pull/14846/head:pr-14846 && git checkout pr-14846
#
#   # Get the postgres password
#   PG_PASS=$(kubectl get secret postgres-password -n openhands -o jsonpath='{.data.postgres-password}' | base64 -d)
#
#   # Run the seed script
#   pip install sqlalchemy psycopg2-binary
#   DATABASE_URL="postgresql://postgres:${PG_PASS}@localhost:5432/openhands" \
#     python enterprise/scripts/setup_and_seed.py --org-count 3 --conversations-per-org 50
# =============================================================================

# Branch-specific naming
fullnameOverride: openhands-admin-dashboard

# Branch-specific image
# NOTE: For PR deployments, build enterprise-server from your PR branch
# The open-source ghcr.io/openhands/openhands image lacks SaaS backend features
image:
  repository: ghcr.io/openhands/enterprise-server
  tag: pr-14846
  pullPolicy: Always

# =============================================================================
# Authentication - Use Shared Keycloak
# =============================================================================
# The staging environment has a shared Keycloak at auth.ohe-staging.platform-team.all-hands.dev
# Each branch uses the same Keycloak realm but needs its redirect URI registered
keycloak:
  enabled: false
  # CRITICAL: Set authHost to point to shared Keycloak
  # Without this, the chart computes AUTH_URL as auth.admin-dashboard.ohe-staging.platform-team.all-hands.dev which doesn't exist
  authHost: auth.ohe-staging.platform-team.all-hands.dev
  # Keycloak server URL for backend token exchange
  url: "https://auth.ohe-staging.platform-team.all-hands.dev"
  # Redirect URIs already registered manually in Keycloak
  # Keeping enabled: false to skip the hook job that keeps failing
  redirectUriRegistration:
    enabled: false
    keycloakUrl: "https://auth.ohe-staging.platform-team.all-hands.dev"
    realmName: "allhands"
    clientId: "allhands"
    adminUser: "admin"
    adminPasswordSecret:
      name: "keycloak-admin"
      key: "admin-password"
keycloakConfig:
  enabled: false

# Enable Enterprise SSO button on frontend
enterpriseSSO:
  enabled: true

# =============================================================================
# Environment Configuration
# =============================================================================
env:
  # Runtime Configuration (uses shared runtime-api)
  # Must use *.ohe-staging... to match the wildcard SSL certificate
  RUNTIME_URL_PATTERN: https://{runtime_id}.ohe-staging.platform-team.all-hands.dev
  
  # LLM Proxy (shared)
  OPENHANDS_PROVIDER_BASE_URL: https://llm-proxy.ohe-staging.platform-team.all-hands.dev/
  
  # Features - Minimal for branch testing (enable as needed)
  ENABLE_BILLING: "false"
  ENABLE_EXPERIMENT_MANAGER: "false"
  ENABLE_MCP_SEARCH_ENGINE: "false"
  ENABLE_PROACTIVE_CONVERSATION_STARTERS: "false"
  ENABLE_SOLVABILITY_ANALYSIS: "false"
  ENABLE_V1_GITHUB_RESOLVER: "false"
  ENABLE_V1_SLACK_RESOLVER: "false"
  
  # UI Flags
  OH_WEB_CLIENT_FEATURE_FLAGS_ENABLE_BILLING: "false"
  OH_WEB_CLIENT_FEATURE_FLAGS_ENABLE_JIRA: "false"
  OH_WEB_CLIENT_FEATURE_FLAGS_HIDE_BILLING_PAGE: "true"
  OH_WEB_CLIENT_FEATURE_FLAGS_HIDE_INTEGRATIONS_PAGE: "false"
  OH_WEB_CLIENT_FEATURE_FLAGS_HIDE_USERS_PAGE: "false"
  
  # Access Control (allow internal emails for testing)
  DUPLICATE_EMAIL_CHECK: "false"
  OH_USER_AUTHORIZER_PREVENT_DUPLICATES: "false"
  EMAIL_PATTERN_BLACKLIST: '%'
  EMAIL_PATTERN_WHITELIST: '%@openhands.dev,%@all-hands.dev'

# =============================================================================
# Disable Integrations (not needed for branch testing)
# =============================================================================
github:
  enabled: false
githubProxy:
  enabled: false
gitlab:
  enabled: false
gitlabWebhookInstallation:
  enabled: false
slack:
  enabled: false
stripe:
  enabled: false
linear:
  enabled: false
jira:
  enabled: false
resend:
  enabled: false
resendSync:
  enabled: false
bitbucket:
  enabled: false
tavily:
  enabled: false

# =============================================================================
# Runtime-API - Per-branch instance (replaces shared)
# =============================================================================
runtime-api:
  enabled: true
  fullnameOverride: openhands-admin-dashboard-runtime-api
  env:
    RUNTIME_CLASS: ""
    # CRITICAL: Must match the wildcard DNS zone for sandbox ingresses
    # This MUST be set to "ohe-staging.platform-team.all-hands.dev" so that:
    # 1. Sandbox ingresses are created with *.ohe-staging.platform-team.all-hands.dev hosts
    # 2. The wildcard DNS certificate (*.ohe-staging.platform-team.all-hands.dev) covers these hosts
    # 3. Runtime-api's check_alive_with_ingress() can resolve sandbox URLs from within the cluster
    # Do NOT use the default "runtime.all-hands.dev" - that DNS zone has no wildcard entry
    RUNTIME_BASE_URL: "ohe-staging.platform-team.all-hands.dev"
    # Set RUNTIME_DISABLE_SSL=true because the wildcard cert is for *.ohe-staging...
    # but the health check needs to use HTTP (Traefik does TLS termination)
    RUNTIME_DISABLE_SSL: "true"
    # CRITICAL: Must use FQDN for cross-namespace database access
    # Using short hostname (e.g., "oh-main-postgresql") will fail DNS resolution
    DB_HOST: openhands-postgresql.openhands.svc.cluster.local
    DB_PORT: "5432"
    DB_NAME: runtime_api_admin_dashboard
    # CRITICAL: Must match the namespace where runtime-api is deployed
    # Using "openhands" (from base values.yaml) causes sandbox pods to be created
    # in the wrong namespace, breaking status monitoring between runtime-api and sandbox pods
    K8S_NAMESPACE: "openhands-admin-dashboard"
  # Use external database from shared postgresql
  externalDatabase:
    enabled: true
    existingSecret: postgres-password
  databaseMigrations:
    createDatabases: true
    migrate: true
  # Disable warm runtimes for branch testing to save resources
  warmRuntimes:
    enabled: false

# =============================================================================
# Sandbox - Use per-branch runtime-api instead of shared
# =============================================================================
sandbox:
  apiHostname: http://openhands-admin-dashboard-runtime-api:5000

automation:
  enabled: false
  events:
    enabled: false
automationEvents:
  enabled: false
automationServiceKey:
  enabled: false
automationWebhookSecret:
  enabled: false
automationService:
  eventForwardingEnabled: false
mcp:
  enabled: false
mcpEvents:
  enabled: false
integrations:
  enabled: false
integrationEvents:
  enabled: false
pluginDirectory:
  enabled: false

# =============================================================================
# PostgreSQL - Per-branch database on shared instance
# =============================================================================
postgresql:
  enabled: false
databaseMigrations:
  waitForDatabase: true
  createDatabases: true  # Create openhands_admin_dashboard database (underscores - hyphens not allowed in PostgreSQL)
  migrate: true
  postgresImage: docker.io/bitnamilegacy/postgresql:16.4.0-debian-12-r14
externalDatabase:
  host: openhands-postgresql.openhands.svc.cluster.local
  port: 5432
  username: postgres
  database: openhands_admin_dashboard  # Per-branch database (underscores required)
  existingSecret: postgres-password
  secretKey: postgres-password

# =============================================================================
# Use Shared Redis
# =============================================================================
redis:
  enabled: false
redisConnection:
  host: openhands-redis-master.openhands.svc.cluster.local
  port: 6379
  existingSecret: redis
  secretKey: redis-password

# =============================================================================
# LiteLLM - Per-branch on shared PostgreSQL
# =============================================================================
litellm-helm:
  enabled: true
  envVars:
    JSON_LOGS: "true"
  db:
    deployStandalone: false
    useExisting: true
    database: litellm_admin_dashboard  # Per-branch database (underscores required)
    endpoint: openhands-postgresql.openhands.svc.cluster.local
    secret:
      name: postgres-password
      usernameKey: username
      passwordKey: password
litellm:
  url: "http://openhands-admin-dashboard-litellm:4000"

# =============================================================================
# MinIO - Per-branch instance (needed for file storage)
# =============================================================================
minio:
  enabled: true
  fullnameOverride: openhands-admin-dashboard-minio

# =============================================================================
# Ingress Configuration
# =============================================================================
ingress:
  enabled: true
  className: traefik
  host: admin-dashboard.ohe-staging.platform-team.all-hands.dev
  prefixWithBranch: false
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  hosts:
    - host: admin-dashboard.ohe-staging.platform-team.all-hands.dev
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - admin-dashboard.ohe-staging.platform-team.all-hands.dev
      secretName: ohe-staging-wildcard-tls

# =============================================================================
# Disable DataDog (for branch testing)
# =============================================================================
datadog:
  enabled: false
