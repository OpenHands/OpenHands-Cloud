# =============================================================================
# Staging Path-Route Environment (CI continuous deployment)
# =============================================================================
# Deployed to: pathroute.ohe-staging.platform-team.all-hands.dev
# Infrastructure: Platform Team Sandbox GCP project (shared with #580)
# Base config: testenv-charts/helm/environments/staging/base-values.yaml
#
# This environment tests path-based routing where services are accessed via
# URL paths: /api/automation, /integration/*, etc.
# =============================================================================

# Path-based routing configuration
ingress:
  routingMode: path
  pathPrefix: ""
  
# Environment-specific URLs (branchSanitized=pathroute set via --set)
automation:
  openhandsApiUrl: "https://pathroute.ohe-staging.platform-team.all-hands.dev"
  automationBaseUrl: "https://pathroute.ohe-staging.platform-team.all-hands.dev"

automationService:
  url: "https://pathroute.ohe-staging.platform-team.all-hands.dev/api/automation"

# Override runtime URL pattern for this environment
env:
  RUNTIME_URL_PATTERN: "https://pathroute.ohe-staging.platform-team.all-hands.dev/runtime/{runtime_id}"
