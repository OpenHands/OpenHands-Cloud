name: Validate Chart Versions

on:
  workflow_call:
    inputs:
      base_ref:
        description: 'Base reference for comparison (e.g., HEAD~1 for push, origin/main for PR)'
        required: false
        type: string
        default: 'HEAD~1'
      enforce_version_bump:
        description: 'Whether to enforce version bump for changed charts'
        required: false
        type: boolean
        default: true
    outputs:
      crd-check-publishable:
        description: 'Whether crd-check chart is publishable (no changes or version bumped)'
        value: ${{ jobs.validate-chart-versions.outputs.crd-check-publishable }}
      runtime-api-publishable:
        description: 'Whether runtime-api chart is publishable (no changes or version bumped)'
        value: ${{ jobs.validate-chart-versions.outputs.runtime-api-publishable }}
      image-loader-publishable:
        description: 'Whether image-loader chart is publishable (no changes or version bumped)'
        value: ${{ jobs.validate-chart-versions.outputs.image-loader-publishable }}
      automation-publishable:
        description: 'Whether automation chart is publishable (no changes or version bumped)'
        value: ${{ jobs.validate-chart-versions.outputs.automation-publishable }}
      plugin-directory-publishable:
        description: 'Whether plugin-directory chart is publishable (no changes or version bumped)'
        value: ${{ jobs.validate-chart-versions.outputs.plugin-directory-publishable }}
      integrations-hub-publishable:
        description: 'Whether integrations-hub chart is publishable (no changes or version bumped)'
        value: ${{ jobs.validate-chart-versions.outputs.integrations-hub-publishable }}
      agent-canvas-publishable:
        description: 'Whether agent-canvas chart is publishable (no changes or version bumped)'
        value: ${{ jobs.validate-chart-versions.outputs.agent-canvas-publishable }}
      openhands-publishable:
        description: 'Whether openhands chart is publishable (no changes or version bumped)'
        value: ${{ jobs.validate-chart-versions.outputs.openhands-publishable }}
      openhands-secrets-publishable:
        description: 'Whether openhands-secrets chart is publishable (no changes or version bumped)'
        value: ${{ jobs.validate-chart-versions.outputs.openhands-secrets-publishable }}

jobs:
  validate-chart-versions:
    runs-on: ubuntu-latest
    env:
      YQ_VERSION: 'v4.47.1'
    outputs:
      crd-check-publishable: ${{ steps.validate.outputs.crd-check-publishable }}
      runtime-api-publishable: ${{ steps.validate.outputs.runtime-api-publishable }}
      image-loader-publishable: ${{ steps.validate.outputs.image-loader-publishable }}
      automation-publishable: ${{ steps.validate.outputs.automation-publishable }}
      plugin-directory-publishable: ${{ steps.validate.outputs.plugin-directory-publishable }}
      integrations-hub-publishable: ${{ steps.validate.outputs.integrations-hub-publishable }}
      agent-canvas-publishable: ${{ steps.validate.outputs.agent-canvas-publishable }}
      openhands-publishable: ${{ steps.validate.outputs.openhands-publishable }}
      openhands-secrets-publishable: ${{ steps.validate.outputs.openhands-secrets-publishable }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Need full history for comparison

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
          sudo chmod +x /usr/local/bin/yq

      - name: Check for chart changes and validate version bumps
        id: validate
        env:
          BASE_REF: ${{ inputs.base_ref }}
          ENFORCE_VERSION_BUMP: ${{ inputs.enforce_version_bump }}
        run: |
          echo "Comparing against: $BASE_REF"

          # Get list of changed files
          CHANGED_FILES=$(git diff --name-only "${BASE_REF}...HEAD")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Dynamically discover all chart directories
          CHART_DIRS=()
          for dir in charts/*/; do
            if [ -f "${dir}Chart.yaml" ]; then
              # Remove trailing slash
              chart_dir="${dir%/}"
              CHART_DIRS+=("$chart_dir")
            fi
          done

          echo "Found chart directories: ${CHART_DIRS[@]}"

          # Track if any validation failed
          VALIDATION_FAILED=false

          for chart_dir in "${CHART_DIRS[@]}"; do
            # Extract chart name from path (e.g., "charts/runtime-api" -> "runtime-api")
            chart_name=$(basename "$chart_dir")
            
            # Check if any files in this chart directory were changed (excluding README.md)
            CHART_CHANGES=$(echo "$CHANGED_FILES" | grep "^${chart_dir}/" | grep -v "README.md" || true)
            if [ -n "$CHART_CHANGES" ]; then
              echo "Changes detected in ${chart_dir}, validating version..."
              echo "Changed files (excluding README.md):"
              echo "$CHART_CHANGES"

              # Get current version
              CURRENT_VERSION=$(yq e '.version' "${chart_dir}/Chart.yaml")
              echo "Current version: $CURRENT_VERSION"

              # Get base version
              BASE_VERSION=$(git show "${BASE_REF}:${chart_dir}/Chart.yaml" | yq e '.version' -)
              echo "Base version: $BASE_VERSION"

              # Check if version was bumped
              if [ "$CURRENT_VERSION" = "$BASE_VERSION" ]; then
                # Version not bumped - not publishable
                echo "${chart_name}-publishable=false" >> $GITHUB_OUTPUT
                
                if [ "$ENFORCE_VERSION_BUMP" = "true" ]; then
                  echo "❌ ERROR: Chart ${chart_dir} has changes but version was not bumped!"
                  echo "   Current version: $CURRENT_VERSION"
                  echo "   Base version: $BASE_VERSION"
                  echo "   Please increment the version in ${chart_dir}/Chart.yaml"
                  VALIDATION_FAILED=true
                else
                  echo "⚠️ WARNING: Chart ${chart_dir} has changes but version was not bumped"
                  echo "   Current version: $CURRENT_VERSION"
                  echo "   Base version: $BASE_VERSION"
                  echo "   Chart will NOT be published"
                fi
              else
                # Version bumped - publishable
                echo "${chart_name}-publishable=true" >> $GITHUB_OUTPUT
                echo "✅ Version bumped for ${chart_dir}: $BASE_VERSION → $CURRENT_VERSION"
              fi
            else
              # No changes - mark as publishable (though detect-changes will skip it anyway)
              echo "${chart_name}-publishable=true" >> $GITHUB_OUTPUT
              echo "No changes in ${chart_dir}, skipping version validation"
            fi
          done

          if [ "$VALIDATION_FAILED" = true ]; then
            echo ""
            echo "Version validation failed! Please bump the chart versions for all modified charts."
            exit 1
          fi

          echo "All chart version validations passed!"
