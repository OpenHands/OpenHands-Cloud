name: Helm chart tests

on:
  pull_request:
  merge_group:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: helm-chart-tests-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

jobs:
  kind-tests:
    name: KinD install and helm test (${{ matrix.profile }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        profile:
          - ephemeral
          - persistent
    env:
      PROFILE: ${{ matrix.profile }}
      RELEASE: openhands
      NAMESPACE: openhands
      CHART: charts/openhands
      KIND_CLUSTER: openhands-ci
      ARTIFACT_DIR: artifacts
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: Azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.21.3

      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.32.0
          node_image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
          kubectl_version: v1.36.1
          cluster_name: openhands-ci
          wait: 120s

      - name: Install chart and run native Helm tests
        run: bash ci/run-kind-helm-tests.sh run "$PROFILE" --reuse-cluster

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: helm-chart-test-diagnostics-${{ matrix.profile }}-attempt-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7
