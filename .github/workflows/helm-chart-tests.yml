name: Helm chart tests

on:
  pull_request:
  merge_group:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: helm-chart-tests-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

jobs:
  kind-tests:
    name: KinD install and helm test (${{ matrix.profile }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        include:
          - profile: ephemeral
            values: ci/kind-profiles/ephemeral.yaml
          - profile: persistent
            values: ci/kind-profiles/persistent.yaml
    env:
      PROFILE: ${{ matrix.profile }}
      PROFILE_VALUES: ${{ matrix.values }}
      RELEASE: openhands
      NAMESPACE: openhands
      CHART: charts/openhands
      KIND_CLUSTER: openhands-ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: Azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.21.3

      - name: Build chart dependencies
        run: |
          helm repo add lmnr https://lmnr-ai.github.io/lmnr-helm
          helm repo add minio https://charts.min.io/
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build "$CHART"

      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.32.0
          node_image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
          kubectl_version: v1.36.1
          cluster_name: openhands-ci
          wait: 120s

      - name: Record tool versions
        run: |
          helm version
          kind version
          kubectl version --client

      - name: Prepare namespace and dummy secrets
        run: |
          kubectl create namespace "$NAMESPACE"
          bash ci/create-kind-secrets.sh "$NAMESPACE"

      - name: Verify persistent storage class
        if: matrix.profile == 'persistent'
        run: kubectl get storageclass standard

      - name: Install chart
        run: |
          mkdir -p artifacts
          set -euo pipefail
          helm install "$RELEASE" "$CHART" \
            --namespace "$NAMESPACE" \
            --values ci/kind-values.yaml \
            --values "$PROFILE_VALUES" \
            --wait \
            --wait-for-jobs \
            --timeout 25m \
            2>&1 | tee artifacts/helm-install.log

      - name: Verify persistent volumes
        if: matrix.profile == 'persistent'
        run: |
          set -euo pipefail
          for pvc in \
            "openhands-minio" \
            "data-openhands-postgresql-0" \
            "redis-data-openhands-redis-master-0"
          do
            kubectl wait \
              --namespace "$NAMESPACE" \
              --for=jsonpath='{.status.phase}'=Bound \
              "pvc/$pvc" \
              --timeout=5m
          done

      # This first increment intentionally runs only the parent chart's basic
      # connection smoke test. Additional parent hooks can be added explicitly.
      - name: Run native Helm tests
        run: |
          set -euo pipefail
          for test_run in 1 2; do
            echo "Helm test run ${test_run}/2 for profile ${PROFILE}"
            helm test "$RELEASE" \
              --namespace "$NAMESPACE" \
              --filter "name=${RELEASE}-test-connection" \
              --logs \
              --timeout 10m \
              2>&1 | tee -a artifacts/helm-test.log
          done

      - name: Collect failure diagnostics
        if: failure()
        run: |
          mkdir -p artifacts
          helm status "$RELEASE" -n "$NAMESPACE" > artifacts/helm-status.txt 2>&1 || true
          helm get hooks "$RELEASE" -n "$NAMESPACE" > artifacts/helm-hooks.yaml 2>&1 || true
          kubectl get pods,deployments,statefulsets,jobs -n "$NAMESPACE" -o wide > artifacts/workloads.txt 2>&1 || true
          kubectl get pvc -n "$NAMESPACE" -o wide > artifacts/pvcs.txt 2>&1 || true
          kubectl get pv -o wide > artifacts/pvs.txt 2>&1 || true
          kubectl get storageclass -o wide > artifacts/storageclasses.txt 2>&1 || true
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp > artifacts/events.txt 2>&1 || true
          kubectl describe pods -n "$NAMESPACE" > artifacts/pod-descriptions.txt 2>&1 || true
          kubectl describe pvc -n "$NAMESPACE" > artifacts/pvc-descriptions.txt 2>&1 || true

          while IFS= read -r pod; do
            name="${pod#pod/}"
            kubectl logs -n "$NAMESPACE" "$pod" --all-containers --prefix > "artifacts/${name}.log" 2>&1 || true
            kubectl logs -n "$NAMESPACE" "$pod" --all-containers --prefix --previous > "artifacts/${name}-previous.log" 2>&1 || true
          done < <(kubectl get pods -n "$NAMESPACE" -o name 2>/dev/null || true)

          kind export logs artifacts/kind --name "$KIND_CLUSTER" || true
          df -h > artifacts/disk.txt || true
          docker system df > artifacts/docker-disk.txt || true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: helm-chart-test-diagnostics-${{ matrix.profile }}-attempt-${{ github.run_attempt }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7
