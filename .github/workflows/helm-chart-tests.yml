name: Helm chart tests

on:
  pull_request:
  merge_group:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: helm-chart-tests-${{ github.event.pull_request.number || github.event.merge_group.head_sha || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-24.04
    outputs:
      helm: ${{ steps.filter.outputs.helm }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            helm:
              - 'charts/**'
              - 'ci/**'
              - 'replicated/**'
              - 'scripts/test_helm_test_hooks_template.py'
              - '.github/workflows/helm-chart-tests.yml'
              - '.github/workflows/pr-checks.yml'
              - '.github/workflows/test-scripts.yml'

  kind-tests:
    name: KinD install and helm test
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || needs.changes.outputs.helm == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RELEASE: openhands
      NAMESPACE: openhands
      CHART: charts/openhands
      KIND_CLUSTER: openhands-ci
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: Azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.21.3

      - name: Build chart dependencies
        run: |
          helm repo add lmnr https://lmnr-ai.github.io/lmnr-helm
          helm repo add minio https://charts.min.io/
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build "$CHART"

      - uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc # v1.14.0
        with:
          version: v0.32.0
          node_image: kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5
          kubectl_version: v1.36.1
          cluster_name: openhands-ci
          wait: 120s

      - name: Record tool versions
        run: |
          helm version
          kind version
          kubectl version --client

      - name: Prepare namespace and dummy secrets
        run: |
          kubectl create namespace "$NAMESPACE"
          bash ci/create-kind-secrets.sh "$NAMESPACE"

      - name: Install chart
        run: |
          mkdir -p artifacts
          set -o pipefail
          helm install "$RELEASE" "$CHART" \
            --namespace "$NAMESPACE" \
            --values ci/kind-values.yaml \
            --wait \
            --wait-for-jobs \
            --timeout 25m \
            2>&1 | tee artifacts/helm-install.log

      # This first increment intentionally runs only the parent chart's basic
      # connection smoke test. Additional parent hooks can be added explicitly.
      - name: Run native Helm tests
        run: |
          set -o pipefail
          helm test "$RELEASE" \
            --namespace "$NAMESPACE" \
            --filter "name=${RELEASE}-test-connection" \
            --logs \
            --timeout 10m \
            2>&1 | tee artifacts/helm-test.log

      - name: Collect failure diagnostics
        if: failure()
        run: |
          mkdir -p artifacts
          helm status "$RELEASE" -n "$NAMESPACE" > artifacts/helm-status.txt 2>&1 || true
          helm get hooks "$RELEASE" -n "$NAMESPACE" > artifacts/helm-hooks.yaml 2>&1 || true
          kubectl get pods,deployments,statefulsets,jobs -n "$NAMESPACE" -o wide > artifacts/workloads.txt 2>&1 || true
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp > artifacts/events.txt 2>&1 || true
          kubectl describe pods -n "$NAMESPACE" > artifacts/pod-descriptions.txt 2>&1 || true

          while IFS= read -r pod; do
            name="${pod#pod/}"
            kubectl logs -n "$NAMESPACE" "$pod" --all-containers --prefix > "artifacts/${name}.log" 2>&1 || true
            kubectl logs -n "$NAMESPACE" "$pod" --all-containers --prefix --previous > "artifacts/${name}-previous.log" 2>&1 || true
          done < <(kubectl get pods -n "$NAMESPACE" -o name 2>/dev/null || true)

          kind export logs artifacts/kind --name "$KIND_CLUSTER" || true
          df -h > artifacts/disk.txt || true
          docker system df > artifacts/docker-disk.txt || true

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: helm-chart-test-diagnostics
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7

  required:
    name: Required
    if: always()
    needs:
      - changes
      - kind-tests
    runs-on: ubuntu-24.04
    steps:
      - name: Evaluate Helm chart test result
        env:
          EVENT_NAME: ${{ github.event_name }}
          CHANGES_RESULT: ${{ needs.changes.result }}
          HELM_CHANGED: ${{ needs.changes.outputs.helm }}
          TEST_RESULT: ${{ needs.kind-tests.result }}
        run: |
          if [[ "$CHANGES_RESULT" != "success" ]]; then
            exit 1
          fi
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            [[ "$TEST_RESULT" == "success" ]]
            exit
          fi
          case "$HELM_CHANGED" in
            true)
              [[ "$TEST_RESULT" == "success" ]]
              ;;
            false)
              [[ "$TEST_RESULT" == "skipped" ]]
              ;;
            *)
              echo "Unexpected change-detection output: $HELM_CHANGED"
              exit 1
              ;;
          esac
