name: Tag Chart Versions

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'

concurrency:
  group: tag-charts
  cancel-in-progress: false

jobs:
  tag-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Tag chart versions
        run: |
          # Define the charts to process. Embedded subcharts of openhands
          # (runtime-api, automation, plugin-directory, integrations-hub,
          # agent-canvas) version with the openhands chart and are not tagged
          # separately.
          CHARTS=("image-loader" "openhands" "openhands-secrets")
          
          for chart in "${CHARTS[@]}"; do
            CHART_PATH="charts/${chart}/Chart.yaml"
            
            if [ ! -f "$CHART_PATH" ]; then
              echo "Chart.yaml not found at $CHART_PATH, skipping..."
              continue
            fi
            
            # Extract the current version from Chart.yaml using yq
            VERSION=$(yq '.version' "$CHART_PATH")
            
            if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
              echo "Could not extract version for $chart, skipping..."
              continue
            fi
            
            TAG="${chart}/${VERSION}"
            echo "Checking tag: $TAG"
            
            # Check if the tag already exists
            if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
              echo "Tag $TAG already exists, skipping..."
            else
              echo "Creating new tag: $TAG"
              git tag "$TAG"
              git push origin "$TAG"
              echo "Successfully created and pushed tag: $TAG"
            fi
          done
