name: Publish Alpha Helm Charts

# Publishes an ALPHA chart to GHCR for each changed chart on every merge to main.
# Stable versions are NOT published here anymore — release-please owns versions
# and publish-release-charts.yml publishes the stable chart when a release is cut.
#
# The alpha version is <patch-bump of the current Chart.yaml version>-alpha.<run>,
# e.g. with the last release at 0.7.68 the alpha is 0.7.69-alpha.42. Patch-bumping
# keeps the alpha ordered after the last stable release and as a prerelease of the
# next one (0.7.68 < 0.7.69-alpha.42 < 0.7.69); github.run_number is monotonic, so
# the alpha channel sorts correctly under SemVer.
on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      crd-check: ${{ steps.changes.outputs.crd-check }}
      image-loader: ${{ steps.changes.outputs.image-loader }}
      openhands: ${{ steps.changes.outputs.openhands }}
      openhands-secrets: ${{ steps.changes.outputs.openhands-secrets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect chart changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          # Manual runs republish every chart; pushes diff the pushed range.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            for chart in crd-check image-loader openhands openhands-secrets; do
              echo "${chart}=true" >> "$GITHUB_OUTPUT"
            done
            echo "workflow_dispatch: marking all charts changed"
            exit 0
          fi

          # New branch / force-push can report an all-zero "before"; fall back to
          # the previous commit.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          CHANGED_FILES=$(git diff --name-only "$BEFORE" "$SHA")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Embedded subcharts live under charts/openhands/charts/, so their
          # changes count as openhands changes via the ^charts/openhands/ match.
          for chart in crd-check image-loader openhands openhands-secrets; do
            if echo "$CHANGED_FILES" | grep -q "^charts/${chart}/"; then
              echo "${chart}=true" >> "$GITHUB_OUTPUT"
              echo "Changes detected in charts/${chart}"
            else
              echo "${chart}=false" >> "$GITHUB_OUTPUT"
              echo "No changes in charts/${chart}"
            fi
          done

  publish-alpha:
    runs-on: ubuntu-latest
    needs: [detect-changes]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        chart:
          # runtime-api, automation, plugin-directory, integrations-hub, and
          # agent-canvas live inside charts/openhands/charts/ as embedded
          # subcharts and are not published on their own. crd-check stays
          # published because charts/infra and charts/openhands pull it by OCI
          # reference.
          - name: crd-check
            path: charts/crd-check
          - name: image-loader
            path: charts/image-loader
          - name: openhands
            path: charts/openhands
          - name: openhands-secrets
            path: charts/openhands-secrets
      max-parallel: 1
    steps:
      - name: Check if this chart changed
        id: check
        env:
          CHANGES: ${{ toJSON(needs.detect-changes.outputs) }}
          CHART_NAME: ${{ matrix.chart.name }}
        run: |
          CHANGED=$(echo "$CHANGES" | jq -r --arg k "$CHART_NAME" '.[$k]')
          echo "should_publish=${CHANGED}" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED" = "true" ]; then
            echo "✅ $CHART_NAME changed — will publish an alpha"
          else
            echo "⏭️ $CHART_NAME unchanged — skipping"
          fi

      - name: Checkout
        if: steps.check.outputs.should_publish == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        if: steps.check.outputs.should_publish == 'true'
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Install yq
        if: steps.check.outputs.should_publish == 'true'
        uses: mikefarah/yq@v4

      - name: Compute alpha version
        if: steps.check.outputs.should_publish == 'true'
        id: version
        env:
          CHART_PATH: ${{ matrix.chart.path }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          BASE=$(yq '.version' "${CHART_PATH}/Chart.yaml")
          # Patch-bump so the alpha sorts after the last stable release.
          NEXT=$(echo "$BASE" | awk -F. '{printf "%d.%d.%d", $1, $2, $3 + 1}')
          ALPHA="${NEXT}-alpha.${RUN_NUMBER}"
          echo "Base (last released): ${BASE} -> alpha: ${ALPHA}"
          # Write it into Chart.yaml so the packaged chart's internal version
          # matches the published OCI tag.
          yq -i ".version = \"${ALPHA}\"" "${CHART_PATH}/Chart.yaml"
          echo "version=${ALPHA}" >> "$GITHUB_OUTPUT"

      - name: Test ${{ matrix.chart.name }} chart with default values
        if: steps.check.outputs.should_publish == 'true'
        env:
          CHART_NAME: ${{ matrix.chart.name }}
          CHART_PATH: ${{ matrix.chart.path }}
        run: |
          echo "Updating dependencies for ${CHART_NAME}"
          helm dependency update "${CHART_PATH}"

          echo "Running helm lint for ${CHART_NAME}"
          helm lint "${CHART_PATH}"

          if grep -q '^type: library' "${CHART_PATH}/Chart.yaml"; then
            echo "Skipping helm template for library chart ${CHART_NAME}"
          else
            echo "Running helm template for ${CHART_NAME}"
            helm template "${CHART_PATH}" --debug
          fi

      - name: Prepare registry owner
        if: steps.check.outputs.should_publish == 'true'
        id: registry
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_owner=${REPO_OWNER}" >> "$GITHUB_OUTPUT"

      - name: Sanity-check the version is an alpha
        if: steps.check.outputs.should_publish == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "$VERSION" != *-alpha.* ]]; then
            echo "Refusing to publish: '$VERSION' is not an alpha version"
            exit 1
          fi

      - name: Publish ${{ matrix.chart.name }} alpha chart to GHCR
        if: steps.check.outputs.should_publish == 'true'
        uses: appany/helm-oci-chart-releaser@v0.4.2
        with:
          name: ${{ matrix.chart.name }}
          repository: helm-charts
          path: ${{ matrix.chart.path }}
          registry: ghcr.io/${{ steps.registry.outputs.repo_owner }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          update_dependencies: 'true'
          tag: ${{ steps.version.outputs.version }}
