name: Test scripts

on:
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/test-update-openhands-charts.yml'

jobs:
  test-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run scripts tests
        run: >-
          uv run
          --with pytest
          --with requests
          --with PyGithub
          --with fastapi
          --with uvicorn
          --with httpx
          --with ruamel.yaml
          python -m pytest scripts -q
