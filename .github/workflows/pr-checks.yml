name: Pull Request Checks

on:
  pull_request:
    paths:
      - '.github/workflows/pr-checks.yml'
      - 'charts/**'
      - 'replicated/config.yaml'
      - 'replicated/openhands.yaml'
      - 'scripts/test_keycloak_realm_template.py'
      - 'scripts/test_openhands_secrets_template.py'
      - 'scripts/test_replicated_resolver_label.py'
      - 'scripts/test_helm_test_hooks_template.py'

jobs:
  test-keycloak-realm-template:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'
      - name: Build chart dependencies
        run: |
          helm repo add lmnr https://lmnr-ai.github.io/lmnr-helm
          helm repo add minio https://charts.min.io/
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build charts/openhands
      - name: Install test dependencies
        run: python3 -m pip install pytest PyYAML==6.0.3
      - name: Test chart template invariants
        run: >-
          python3 -m pytest
          scripts/test_keycloak_realm_template.py
          scripts/test_openhands_secrets_template.py
          scripts/test_replicated_resolver_label.py
          scripts/test_helm_test_hooks_template.py
