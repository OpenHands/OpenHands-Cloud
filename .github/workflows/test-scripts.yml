name: Test scripts

on:
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/publish-release-charts.yml'
      - '.github/workflows/test-scripts.yml'

jobs:
  test-scripts:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          # 'latest' falls back to helm v3.9.0 when the release lookup is
          # rate-limited, which is too old to render the replicated SDK chart.
          version: 'v3.18.4'

      - name: Build OpenHands chart dependencies
        run: |
          helm repo add lmnr https://lmnr-ai.github.io/lmnr-helm
          helm repo add minio https://charts.min.io/
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm dependency build charts/openhands

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Run scripts tests
        run: >-
          uv run
          --with pytest
          --with requests
          --with PyGithub
          --with fastapi
          --with uvicorn
          --with httpx
          --with ruamel.yaml
          python -m pytest scripts -q
