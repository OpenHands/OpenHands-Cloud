name: release

# Per-chart release automation via the shared OpenHands/release-actions
# (release-please) reusable workflow, plus edge "alpha" publishing to GHCR.
#
# On every push to main:
#   1. One release-please job per chart opens/refreshes that chart's release PR.
#      Each chart is its OWN independent release line: its own config + manifest,
#      its own release PR, its own tag (<chart>/<version>) and GitHub Release.
#      release-please owns the chart `version:` in Chart.yaml; contributors no
#      longer bump it by hand. Each job passes github-scoped-notes: true so the
#      release PR body and the published Release carry the same GitHub-style
#      notes, scoped to that chart's commits.
#   2. publish-alpha then packages each CHANGED chart from main's current content
#      and publishes it to GHCR as <next-candidate>-alpha.<run>, where
#      <next-candidate> is the version that chart's OPEN release PR would cut
#      (read straight from the release PR branch). An unreleased feat that moves
#      the next version to 0.8.0 publishes 0.8.0-alpha.<run>; a chart with no
#      pending release publishes nothing.
#
# Merging a release PR tags the chart; the tag (created with the release App
# token, so it can trigger workflows) fires publish-release-charts.yml to publish
# the STABLE chart to GHCR.
on:
  push:
    branches:
      - main
      # Maintenance/freeze lines (e.g. release/0.7); release-please scopes the
      # release to whichever branch triggered the run. Alpha publishing is
      # main-only (see publish-alpha's `if`).
      - 'release/**'
  workflow_dispatch:

jobs:
  crd-check:
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
    uses: OpenHands/release-actions/.github/workflows/release-please.yml@main
    with:
      config-file: release-please-config.crd-check.json
      manifest-file: .release-please-manifest.crd-check.json
      github-scoped-notes: true

  image-loader:
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
    uses: OpenHands/release-actions/.github/workflows/release-please.yml@main
    with:
      config-file: release-please-config.image-loader.json
      manifest-file: .release-please-manifest.image-loader.json
      github-scoped-notes: true

  openhands:
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
    uses: OpenHands/release-actions/.github/workflows/release-please.yml@main
    with:
      config-file: release-please-config.openhands.json
      manifest-file: .release-please-manifest.openhands.json
      github-scoped-notes: true

  openhands-secrets:
    permissions:
      contents: write
      pull-requests: write
    secrets: inherit
    uses: OpenHands/release-actions/.github/workflows/release-please.yml@main
    with:
      config-file: release-please-config.openhands-secrets.json
      manifest-file: .release-please-manifest.openhands-secrets.json
      github-scoped-notes: true

  # Which charts changed on this push. Runs in parallel with the release-please
  # jobs above; publish-alpha gates each chart's publish on this.
  detect-changes:
    runs-on: ubuntu-24.04
    outputs:
      crd-check: ${{ steps.changes.outputs.crd-check }}
      image-loader: ${{ steps.changes.outputs.image-loader }}
      openhands: ${{ steps.changes.outputs.openhands }}
      openhands-secrets: ${{ steps.changes.outputs.openhands-secrets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect chart changes
        id: changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BEFORE: ${{ github.event.before }}
          SHA: ${{ github.sha }}
        run: |
          # Manual runs reconsider every chart; pushes diff the pushed range.
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            for chart in crd-check image-loader openhands openhands-secrets; do
              echo "${chart}=true" >> "$GITHUB_OUTPUT"
            done
            echo "workflow_dispatch: marking all charts changed"
            exit 0
          fi

          # New branch / force-push can report an all-zero "before"; fall back to
          # the previous commit.
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            BEFORE="HEAD~1"
          fi
          CHANGED_FILES=$(git diff --name-only "$BEFORE" "$SHA")
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # crd-check, image-loader, and openhands-secrets are independent
          # release lines: each changes only when files under its own chart
          # directory change.
          for chart in crd-check image-loader openhands-secrets; do
            if echo "$CHANGED_FILES" | grep -q "^charts/${chart}/"; then
              echo "${chart}=true" >> "$GITHUB_OUTPUT"
              echo "Changes detected in charts/${chart}"
            else
              echo "${chart}=false" >> "$GITHUB_OUTPUT"
              echo "No changes in charts/${chart}"
            fi
          done

          # openhands is the umbrella release line: its release-please config is
          # rooted at the repo root with exclude-paths for the three charts above
          # (see release-please-config.openhands.json), so a change to
          # charts/infra/, replicated/, or anything else outside those charts
          # counts as an openhands change — as do its own embedded subcharts
          # under charts/openhands/charts/. openhands is "changed" whenever any
          # touched file is NOT under one of those three independent charts.
          OPENHANDS_CHANGES=$(echo "$CHANGED_FILES" | \
            grep -vE '^charts/(crd-check|image-loader|openhands-secrets)/' || true)
          if [ -n "$OPENHANDS_CHANGES" ]; then
            echo "openhands=true" >> "$GITHUB_OUTPUT"
            echo "Changes detected for openhands (outside the independent charts)"
          else
            echo "openhands=false" >> "$GITHUB_OUTPUT"
            echo "No openhands-relevant changes"
          fi

  # Edge alpha publish. Waits for the release-please jobs so each chart's release
  # PR (and therefore its proposed next version) reflects this push, then
  # publishes an alpha of every changed chart at that chart's next candidate
  # version. Main-only — release/** pushes just refresh their release PRs.
  publish-alpha:
    needs: [crd-check, image-loader, openhands, openhands-secrets, detect-changes]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        chart:
          # runtime-api, automation, plugin-directory, integrations-hub, and
          # agent-canvas live inside charts/openhands/charts/ as embedded
          # subcharts and are not published on their own. crd-check stays
          # published because charts/infra and charts/openhands pull it by OCI
          # reference.
          - name: crd-check
            path: charts/crd-check
          - name: image-loader
            path: charts/image-loader
          - name: openhands
            path: charts/openhands
          - name: openhands-secrets
            path: charts/openhands-secrets
      max-parallel: 1
    steps:
      - name: Check if this chart changed
        id: check
        env:
          CHANGES: ${{ toJSON(needs.detect-changes.outputs) }}
          CHART_NAME: ${{ matrix.chart.name }}
        run: |
          CHANGED=$(echo "$CHANGES" | jq -r --arg k "$CHART_NAME" '.[$k]')
          echo "should_publish=${CHANGED}" >> "$GITHUB_OUTPUT"
          if [ "$CHANGED" = "true" ]; then
            echo "✅ $CHART_NAME changed — resolving its next candidate version"
          else
            echo "⏭️ $CHART_NAME unchanged — skipping"
          fi

      - name: Resolve next candidate version
        id: candidate
        if: steps.check.outputs.should_publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          CHART_NAME: ${{ matrix.chart.name }}
        run: |
          # release-please parks each chart's pending release PR on its own
          # branch and writes the proposed next version into that chart's
          # manifest on it. Read it straight from the branch — that's the
          # version the open release PR would cut. No pending PR (the change
          # wasn't release-worthy, e.g. a chore) ⇒ no candidate ⇒ no alpha.
          BRANCH="release-please--branches--main--components--${CHART_NAME}"
          MANIFEST=".release-please-manifest.${CHART_NAME}.json"
          # openhands is the umbrella release line rooted at the repo root, so its
          # manifest key is "." (not charts/openhands); the other charts key on
          # their own chart path.
          if [ "$CHART_NAME" = "openhands" ]; then
            KEY="."
          else
            KEY="charts/${CHART_NAME}"
          fi

          CAND_RAW=$(gh api -H "Accept: application/vnd.github.raw" \
            "repos/${REPO}/contents/${MANIFEST}?ref=${BRANCH}" 2>/dev/null) || CAND_RAW=""
          if [ -z "$CAND_RAW" ]; then
            echo "No pending release PR branch for ${CHART_NAME} — nothing to alpha-publish."
            echo "has_candidate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CANDIDATE=$(echo "$CAND_RAW" | jq -r ".\"${KEY}\" // empty")
          if [ -z "$CANDIDATE" ]; then
            echo "Manifest on ${BRANCH} carries no version for ${KEY} — skipping."
            echo "has_candidate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Guard against a just-cut release (or a stale, undeleted release PR
          # branch): the released version lives in main's manifest at this push.
          # If the candidate already equals it, there's no pending bump to alpha —
          # the stable was just published (by publish-release-charts.yml), so
          # alpha-publishing the same version would sort an alpha BEFORE its
          # already-released stable. Skip.
          REL_RAW=$(gh api -H "Accept: application/vnd.github.raw" \
            "repos/${REPO}/contents/${MANIFEST}?ref=${SHA}" 2>/dev/null) || REL_RAW=""
          RELEASED=$(echo "$REL_RAW" | jq -r ".\"${KEY}\" // empty")
          if [ "$CANDIDATE" = "$RELEASED" ]; then
            echo "Candidate ${CANDIDATE} already released on main — skipping alpha."
            echo "has_candidate=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Next candidate version for ${CHART_NAME}: ${CANDIDATE} (released: ${RELEASED:-none})"
          echo "has_candidate=true" >> "$GITHUB_OUTPUT"
          echo "candidate=${CANDIDATE}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.check.outputs.should_publish == 'true' && steps.candidate.outputs.has_candidate == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        if: steps.check.outputs.should_publish == 'true' && steps.candidate.outputs.has_candidate == 'true'
        uses: azure/setup-helm@v3
        with:
          version: 'v3.18.4'

      - name: Compute alpha version
        if: steps.check.outputs.should_publish == 'true' && steps.candidate.outputs.has_candidate == 'true'
        id: version
        env:
          CHART_PATH: ${{ matrix.chart.path }}
          CANDIDATE: ${{ steps.candidate.outputs.candidate }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          # Alpha of the upcoming release: 0.8.0-alpha.<run> sorts after the last
          # stable (0.7.x) and before 0.8.0 itself; github.run_number is monotonic
          # so the alpha channel orders correctly under SemVer.
          ALPHA="${CANDIDATE}-alpha.${RUN_NUMBER}"
          echo "Candidate ${CANDIDATE} -> alpha ${ALPHA}"
          # Write it into Chart.yaml so the packaged chart's internal version
          # matches the published OCI tag.
          yq -i ".version = \"${ALPHA}\"" "${CHART_PATH}/Chart.yaml"
          echo "version=${ALPHA}" >> "$GITHUB_OUTPUT"

      - name: Test ${{ matrix.chart.name }} chart with default values
        if: steps.check.outputs.should_publish == 'true' && steps.candidate.outputs.has_candidate == 'true'
        env:
          CHART_NAME: ${{ matrix.chart.name }}
          CHART_PATH: ${{ matrix.chart.path }}
        run: |
          echo "Updating dependencies for ${CHART_NAME}"
          helm dependency update "${CHART_PATH}"

          echo "Running helm lint for ${CHART_NAME}"
          helm lint "${CHART_PATH}"

          if grep -q '^type: library' "${CHART_PATH}/Chart.yaml"; then
            echo "Skipping helm template for library chart ${CHART_NAME}"
          else
            echo "Running helm template for ${CHART_NAME}"
            helm template "${CHART_PATH}" --debug
          fi

      - name: Prepare registry owner
        if: steps.check.outputs.should_publish == 'true' && steps.candidate.outputs.has_candidate == 'true'
        id: registry
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_owner=${REPO_OWNER}" >> "$GITHUB_OUTPUT"

      - name: Sanity-check the version is an alpha
        if: steps.check.outputs.should_publish == 'true' && steps.candidate.outputs.has_candidate == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if [[ "$VERSION" != *-alpha.* ]]; then
            echo "Refusing to publish: '$VERSION' is not an alpha version"
            exit 1
          fi

      - name: Publish ${{ matrix.chart.name }} alpha chart to GHCR
        if: steps.check.outputs.should_publish == 'true' && steps.candidate.outputs.has_candidate == 'true'
        uses: appany/helm-oci-chart-releaser@v0.4.2
        with:
          name: ${{ matrix.chart.name }}
          repository: helm-charts
          path: ${{ matrix.chart.path }}
          registry: ghcr.io/${{ steps.registry.outputs.repo_owner }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          update_dependencies: 'true'
          tag: ${{ steps.version.outputs.version }}
