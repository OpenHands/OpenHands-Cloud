name: Publish Released Helm Chart

# Publishes the STABLE chart version to GHCR when release-please tags a chart
# release. This replaces the old "publish a stable version on every merge to
# main" — stable charts now publish only when a release is cut.
#
# release-please creates the tag with the shared release App token, so this push
# event triggers workflows (a tag pushed by the default GITHUB_TOKEN would be
# suppressed by GitHub's recursion guard and never fire this job).
#
# Tag shape is <component>/<version> (e.g. openhands/0.7.69). The patterns below
# don't overlap: `openhands/*` matches openhands/0.7.69 but not
# openhands-secrets/0.1.25 (that needs the explicit `openhands-secrets/*`).
on:
  push:
    tags:
      - 'crd-check/*'
      - 'image-loader/*'
      - 'openhands/*'
      - 'openhands-secrets/*'

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      component: ${{ steps.parse.outputs.component }}
      version: ${{ steps.parse.outputs.version }}
      source-sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Parse component and version from tag
        id: parse
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # <component>/<version>: strip the trailing /<version> for the
          # component, and everything up to the last / for the version.
          COMPONENT="${TAG%/*}"
          VERSION="${TAG##*/}"
          {
            echo "component=${COMPONENT}"
            echo "version=${VERSION}"
            echo "path=charts/${COMPONENT}"
          } >> "$GITHUB_OUTPUT"
          echo "Publishing ${COMPONENT} ${VERSION} from charts/${COMPONENT}"

      - name: Checkout (at the release tag)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - name: Resolve source commit
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'latest'

      - name: Lowercase registry owner
        id: owner
        run: |
          REPO_OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_owner=${REPO_OWNER}" >> "$GITHUB_OUTPUT"

      - name: Publish ${{ steps.parse.outputs.component }} chart to GHCR
        uses: appany/helm-oci-chart-releaser@v0.4.2
        with:
          name: ${{ steps.parse.outputs.component }}
          repository: helm-charts
          path: ${{ steps.parse.outputs.path }}
          registry: ghcr.io/${{ steps.owner.outputs.repo_owner }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          update_dependencies: 'true'
          tag: ${{ steps.parse.outputs.version }}

  dispatch-staging-chart-bump:
    name: Dispatch staging chart bump
    needs: publish
    if: ${{ needs.publish.outputs.component == 'openhands' }}
    runs-on: ubuntu-24.04
    environment: staging-chart-bump-dispatcher
    permissions:
      contents: read
    steps:
      - name: Mint saas-deploy dispatcher token
        id: dispatcher-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.STAGING_CHART_BUMP_DISPATCHER_APP_ID }}
          private-key: ${{ secrets.STAGING_CHART_BUMP_DISPATCHER_APP_PRIVATE_KEY }}
          owner: OpenHands
          repositories: saas-deploy
          permission-contents: write

      - name: Dispatch bump-chart-to-staging
        env:
          GH_TOKEN: ${{ steps.dispatcher-token.outputs.token }}
          COMPONENT: ${{ needs.publish.outputs.component }}
          VERSION: ${{ needs.publish.outputs.version }}
          SOURCE_REPO: ${{ github.repository }}
          SOURCE_SHA: ${{ needs.publish.outputs.source-sha }}
        run: |
          gh api \
            --method POST \
            /repos/OpenHands/saas-deploy/dispatches \
            -f event_type=bump-chart-to-staging \
            -f "client_payload[chart]=${COMPONENT}" \
            -f "client_payload[version]=${VERSION}" \
            -f "client_payload[environment]=staging" \
            -f "client_payload[source-repo]=${SOURCE_REPO}" \
            -f "client_payload[source-sha]=${SOURCE_SHA}"
