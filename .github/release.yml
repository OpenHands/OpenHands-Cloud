# Maps PR labels to release-note sections for GitHub's native "Generate release
# notes" button. The automated chart releases do not read this file: the
# release-please github-scoped notes engine builds notes itself from these same
# `type: <type>` labels (applied by the PR-title workflow, .github/workflows/pr.yml).
# Kept only so GitHub's native UI categorizes the same way the engine does; keep
# these categories in sync with the engine in OpenHands/release-actions.
changelog:
  categories:
    - title: Features
      labels: ["type: feat"]
    - title: Bug Fixes
      labels: ["type: fix"]
    - title: Performance
      labels: ["type: perf"]
    - title: Documentation
      labels: ["type: docs"]
    - title: Maintenance
      labels: ["type: chore", "type: build", "type: ci", "type: refactor", "type: style", "type: test", "type: revert"]
    - title: Other Changes
      labels: ["*"]
