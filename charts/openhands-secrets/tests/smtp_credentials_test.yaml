suite: smtp-credentials secret
templates:
  - smtp-credentials.yaml
tests:
  - it: renders no Secret when neither username nor password is set
    asserts:
      - hasDocuments:
          count: 0

  - it: renders a Secret with base64-encoded username and password
    set:
      config.smtp_username: "user"
      config.smtp_password: "pass"
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: smtp-credentials
      - equal:
          path: type
          value: Opaque
      - equal:
          path: data.smtp-username
          value: dXNlcg==
      - equal:
          path: data.smtp-password
          value: cGFzcw==

  - it: renders only smtp-username when only the username is set
    set:
      config.smtp_username: "user"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: data.smtp-username
          value: dXNlcg==
      - notExists:
          path: data.smtp-password

  - it: renders only smtp-password when only the password is set
    set:
      config.smtp_password: "pass"
    asserts:
      - hasDocuments:
          count: 1
      - equal:
          path: data.smtp-password
          value: cGFzcw==
      - notExists:
          path: data.smtp-username
