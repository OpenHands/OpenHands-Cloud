apiVersion: v1
kind: Secret
metadata:
  name: litellm-env-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
data:
  {{- if .Values.config.anthropic_api_key }}
  ANTHROPIC_API_KEY: {{ .Values.config.anthropic_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.openai_api_key }}
  OPENAI_API_KEY: {{ .Values.config.openai_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.google_gemini_api_key }}
  GOOGLE_API_KEY: {{ .Values.config.google_gemini_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.google_vertex_credentials }}
  GOOGLE_APPLICATION_CREDENTIALS_JSON: {{ .Values.config.google_vertex_credentials | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.google_vertex_project_id }}
  VERTEXAI_PROJECT: {{ .Values.config.google_vertex_project_id | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.google_vertex_location }}
  VERTEXAI_LOCATION: {{ .Values.config.google_vertex_location | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.deepseek_api_key }}
  DEEPSEEK_API_KEY: {{ .Values.config.deepseek_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.mistral_api_key }}
  MISTRAL_API_KEY: {{ .Values.config.mistral_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.azure_api_key }}
  AZURE_API_KEY: {{ .Values.config.azure_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.azure_tenant_id }}
  AZURE_TENANT_ID: {{ .Values.config.azure_tenant_id | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.azure_client_id }}
  AZURE_CLIENT_ID: {{ .Values.config.azure_client_id | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.azure_client_secret }}
  AZURE_CLIENT_SECRET: {{ .Values.config.azure_client_secret | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.azure_endpoint }}
  AZURE_API_BASE: {{ .Values.config.azure_endpoint | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.azure_api_version }}
  AZURE_API_VERSION: {{ .Values.config.azure_api_version | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.groq_api_key }}
  GROQ_API_KEY: {{ .Values.config.groq_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.openrouter_api_key }}
  OPENROUTER_API_KEY: {{ .Values.config.openrouter_api_key | b64enc | quote }}
  {{- end }}
  {{- if and .Values.config.bedrock_model_id (eq .Values.config.aws_auth_method "static_keys") }}
  AWS_ACCESS_KEY_ID: {{ .Values.config.aws_access_key_id | b64enc | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.config.aws_secret_access_key | b64enc | quote }}
  AWS_REGION_NAME: {{ .Values.config.aws_region_name | b64enc | quote }}
  {{- else if and .Values.config.bedrock_model_id (eq .Values.config.aws_auth_method "instance_profile") }}
  AWS_REGION_NAME: {{ .Values.config.aws_region_name | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.custom_api_key }}
  CUSTOM_API_KEY: {{ .Values.config.custom_api_key | b64enc | quote }}
  {{- end }}
  {{- if .Values.config.custom_base_url }}
  CUSTOM_API_BASE: {{ .Values.config.custom_base_url | b64enc | quote }}
  {{- end }}