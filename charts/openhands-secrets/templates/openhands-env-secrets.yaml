apiVersion: v1
kind: Secret
metadata:
  name: openhands-env-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  {{- if .Values.config.anthropic_api_key }}
  LLM_API_KEY: '{{ .Values.config.anthropic_api_key }}'
  LLM_MODEL: 'anthropic/claude-sonnet-4-5-20250929'
  LLM_BASE_URL: 'https://api.anthropic.com'
  {{- end }}
  {{- if .Values.config.openai_api_key }}
  LLM_API_KEY: {{ .Values.config.openai_api_key }}
  {{- end }}
  {{- if .Values.config.google_gemini_api_key }}
  LLM_API_KEY: {{ .Values.config.google_gemini_api_key }}
  {{- end }}
  {{- if .Values.config.deepseek_api_key }}
  LLM_API_KEY: {{ .Values.config.deepseek_api_key }}
  {{- end }}
  {{- if .Values.config.mistral_api_key }}
  LLM_API_KEY: {{ .Values.config.mistral_api_key }}
  {{- end }}
  {{- if .Values.config.azure_api_key }}
  LLM_API_KEY: '{{ .Values.config.azure_api_key }}'
  {{- if .Values.config.azure_deployment_name }}
  LLM_MODEL: 'azure/{{ .Values.config.azure_deployment_name }}'
  {{- end }}
  {{- if .Values.config.azure_endpoint }}
  LLM_BASE_URL: '{{ .Values.config.azure_endpoint }}'
  {{- end }}
  {{- if .Values.config.azure_api_version }}
  LLM_API_VERSION: '{{ .Values.config.azure_api_version }}'
  {{- end }}
  {{- end }}
  {{- if .Values.config.groq_api_key }}
  LLM_API_KEY: {{ .Values.config.groq_api_key }}
  {{- end }}
  {{- if .Values.config.openrouter_api_key }}
  LLM_API_KEY: {{ .Values.config.openrouter_api_key }}
  {{- end }}
  {{- if and .Values.config.bedrock_model_id (eq .Values.config.aws_auth_method "static_keys") }}
  LLM_API_KEY: 'placeholder-bedrock-uses-aws-creds'
  AWS_ACCESS_KEY_ID: '{{ .Values.config.aws_access_key_id }}'
  AWS_SECRET_ACCESS_KEY: '{{ .Values.config.aws_secret_access_key }}'
  AWS_REGION_NAME: '{{ .Values.config.aws_region_name }}'
  {{- else if and .Values.config.bedrock_model_id (eq .Values.config.aws_auth_method "instance_profile") }}
  LLM_API_KEY: 'placeholder-bedrock-uses-instance-profile'
  AWS_REGION_NAME: '{{ .Values.config.aws_region_name }}'
  {{- end }}
  {{- if .Values.config.custom_api_key }}
  LLM_API_KEY: {{ .Values.config.custom_api_key }}
  {{- end }}
  {{- if .Values.config.custom_base_url }}
  LLM_BASE_URL: '{{ .Values.config.custom_base_url }}'
  {{- end }}
  {{- if .Values.config.custom_model }}
  LLM_MODEL: 'openai/{{ .Values.config.custom_model }}'
  {{- end }}
