cert-manager:
  enabled: true
  # cert-manager installs its own CRDs when this is true. Required for the
  # openhands chart pre-install CRD check to succeed.
  crds:
    enabled: true
    keep: true
  # cert-manager is cluster-scoped; leaderElection must live in a namespace
  # accessible to all cert-manager pods. The chart default (kube-system) is
  # fine for most installs but is set here explicitly for clarity.
  global:
    leaderElection:
      namespace: kube-system
  # Pod resources are intentionally conservative — cert-manager is idle most
  # of the time for our use case (no ACME solver activity).
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi
  webhook:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
  cainjector:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
  startupapicheck:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

trust-manager:
  enabled: true
  # Trust-manager needs to know which namespace its default CA trust bundle
  # will live in. cert-manager is the standard location.
  app:
    trust:
      namespace: cert-manager
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# Pre-install/pre-upgrade hook that waits for required CRDs to be Established
# before the chart applies resources that depend on them. Use this when a
# release in this chart references CRDs installed by a separate release — for
# example, the trust-manager release waiting on cert-manager CRDs that the
# cert-manager release just created. `helm install --wait` waits for pods,
# not CRD `Established` conditions, so without this hook a fast follow-on
# release can race the apiserver registration.
#
# Disabled by default. Enable on the consuming release (e.g. trust-manager)
# and supply the CRD list to wait on.
crdCheck:
  enabled: false
  timeout: 120s
  backoffLimit: 6
  crds: []
  image:
    repository: docker.io/rancher/kubectl
    tag: v1.33.0
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# Lets a Kubernetes (k0s) upgrade drain nodes without dropping the per-sandbox
# PodDisruptionBudgets that protect sandboxes the rest of the time. A small
# controller watches the embedded-cluster `Installation` state and, while a k0s
# upgrade is rolling nodes, relaxes the sandbox PDBs (maxUnavailable=100%) so
# autopilot's node drains can evict the pods; it sets them back to
# maxUnavailable=0 when the upgrade finishes. The Deployments are left at
# replicas=1, so pods return on their own once the node uncordons. See
# templates/sandbox-upgrade-coordinator.yaml for the full design.
#
# Enable ONLY on embedded-cluster installs (where the Installation CRD exists).
# Disabled by default; on other clusters the controller would just idle.
sandboxUpgradeCoordinator:
  enabled: false
  # Namespace where runtime-api creates sandbox pods and their PDBs (its
  # K8S_NAMESPACE). In the openhands chart this is the openhands release namespace.
  runtimeNamespace: openhands
  # Label selector identifying sandbox PDBs (runtime-api labels each sandbox and
  # its PDB with runtime_id).
  sandboxSelector: runtime_id
  # Installation states that mean a k0s node roll is underway. While any
  # Installation reports one of these, the sandbox PDBs are relaxed so the node
  # can drain. "Enqueued" and "Installing" are the states embedded-cluster sets
  # around the autopilot plan; widen for more lead time or narrow to reduce false
  # starts.
  drainStates:
    - Enqueued
    - Installing
  # Seconds between Installation-state polls.
  pollIntervalSeconds: 10
  # Needs a shell AND kubectl. Do NOT use rancher/kubectl (FROM scratch, no shell).
  image:
    repository: docker.io/alpine/k8s
    tag: "1.30.0"
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi

# Sysbox installer. When enabled, a privileged DaemonSet installs the Sysbox
# container runtime on every node and registers the sysbox RuntimeClass,
# giving pods with runtimeClassName: sysbox-runc VM-like (user-namespace)
# isolation. Disabled by default; the Replicated "Sandbox Isolation" config
# option turns it on.
#
# The Sysbox binaries and systemd units are baked into the image below (the
# official nestybox/sysbox-deploy-k8s image), so the install needs no internet
# access (fixes air-gap) and is not tied to Debian/Ubuntu: the binaries are
# portable Go builds and k0s ships its own containerd, so any systemd host with
# kernel >= 6.3 works. Kernel >= 6.3 is enforced by the openhands chart's Sysbox
# preflight.
sysbox:
  enabled: false
  # Sysbox CE version, used for the on-host idempotency/version check and for
  # logging. Must match the Sysbox version encoded in image.tag below.
  version: "0.7.0"
  # Name of the RuntimeClass + handler. Must stay in sync with the containerd
  # runtime name in files/install-sysbox.sh and the runtime-api RUNTIME_CLASS
  # value (replicated/openhands.yaml).
  runtimeClassName: sysbox-runc
  image:
    # Official nestybox image that ships the Sysbox binaries under
    # /opt/sysbox/bin/generic and the systemd units under /opt/sysbox/systemd.
    # Used ONLY by the init container to stage those artifacts onto the host: it
    # is centos:7-based (util-linux 2.23.2), whose nsenter cannot enter PID 1's
    # namespaces on recent kernels, so it must NOT run the installer itself. The
    # tag encodes the Sysbox version as v<version>-0; keep it in sync with
    # .version above.
    repository: ghcr.io/nestybox/sysbox-deploy-k8s
    tag: v0.7.0-0
    pullPolicy: IfNotPresent
  # Runner image for the installer container. Its only job is to provide a modern
  # nsenter (util-linux >= 2.38) that can enter the host namespaces to run
  # files/install-sysbox.sh; it is never installed on the host, so this stays
  # distro-agnostic for the node. Split out from image above because the nestybox
  # image's ancient nsenter fails on kernel 6.x (exits 1 before the script runs).
  runnerImage:
    repository: docker.io/library/debian
    tag: bookworm-slim
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  # Run on every Linux node, tolerating all taints (incl. control-plane).
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - operator: Exists
  resources:
    requests:
      cpu: 50m
      memory: 100Mi
    limits:
      memory: 512Mi
