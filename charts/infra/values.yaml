cert-manager:
  enabled: true
  # cert-manager installs its own CRDs when this is true. Required for the
  # openhands chart pre-install CRD check to succeed.
  crds:
    enabled: true
    keep: true
  # cert-manager is cluster-scoped; leaderElection must live in a namespace
  # accessible to all cert-manager pods. The chart default (kube-system) is
  # fine for most installs but is set here explicitly for clarity.
  global:
    leaderElection:
      namespace: kube-system
  # Pod resources are intentionally conservative — cert-manager is idle most
  # of the time for our use case (no ACME solver activity).
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      memory: 128Mi
  webhook:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
  cainjector:
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 128Mi
  startupapicheck:
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi

trust-manager:
  enabled: true
  # Trust-manager needs to know which namespace its default CA trust bundle
  # will live in. cert-manager is the standard location.
  app:
    trust:
      namespace: cert-manager
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 64Mi

# Pre-install/pre-upgrade hook that waits for required CRDs to be Established
# before the chart applies resources that depend on them. Use this when a
# release in this chart references CRDs installed by a separate release — for
# example, the trust-manager release waiting on cert-manager CRDs that the
# cert-manager release just created. `helm install --wait` waits for pods,
# not CRD `Established` conditions, so without this hook a fast follow-on
# release can race the apiserver registration.
#
# Disabled by default. Enable on the consuming release (e.g. trust-manager)
# and supply the CRD list to wait on.
crdCheck:
  enabled: false
  timeout: 120s
  backoffLimit: 6
  crds: []
  image:
    repository: docker.io/rancher/kubectl
    tag: v1.33.0
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi

# Lets a Kubernetes (k0s) upgrade drain nodes without dropping the per-sandbox
# PodDisruptionBudgets that protect sandboxes the rest of the time. A small
# controller watches the embedded-cluster `Installation` state and, while a k0s
# upgrade is rolling nodes, relaxes the sandbox PDBs (maxUnavailable=100%) so
# autopilot's node drains can evict the pods; it sets them back to
# maxUnavailable=0 when the upgrade finishes. The Deployments are left at
# replicas=1, so pods return on their own once the node uncordons. See
# templates/sandbox-upgrade-coordinator.yaml for the full design.
#
# Enable ONLY on embedded-cluster installs (where the Installation CRD exists).
# Disabled by default; on other clusters the controller would just idle.
sandboxUpgradeCoordinator:
  enabled: false
  # Namespace where runtime-api creates sandbox pods and their PDBs (its
  # K8S_NAMESPACE). In the openhands chart this is the openhands release namespace.
  runtimeNamespace: openhands
  # Label selector identifying sandbox PDBs (runtime-api labels each sandbox and
  # its PDB with runtime_id).
  sandboxSelector: runtime_id
  # Installation states that mean a k0s node roll is underway. While any
  # Installation reports one of these, the sandbox PDBs are relaxed so the node
  # can drain. "Enqueued" and "Installing" are the states embedded-cluster sets
  # around the autopilot plan; widen for more lead time or narrow to reduce false
  # starts.
  drainStates:
    - Enqueued
    - Installing
  # Seconds between Installation-state polls.
  pollIntervalSeconds: 10
  # Needs a shell AND kubectl. Do NOT use rancher/kubectl (FROM scratch, no shell).
  image:
    repository: docker.io/alpine/k8s
    tag: "1.30.0"
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      memory: 64Mi
