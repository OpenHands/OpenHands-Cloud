apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation
  labels:
    app: automation
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app: automation
  template:
    metadata:
      labels:
        app: automation
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.caBundle.enabled }}
      volumes:
        - name: openhands-ca-bundle
          configMap:
            name: {{ .Values.caBundle.name }}
      {{- end }}
      initContainers:
      {{- if .Values.database.createDatabaseUser }}
      # Create automation database and user in an existing PostgreSQL instance
      - name: create-db-user
        image: postgres:14
        env:
          - name: PGPASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.database.superuserSecretName }}
                key: {{ .Values.database.superuserSecretKey }}
          - name: DB_HOST
            value: {{ .Values.database.host | quote }}
          - name: DB_PORT
            value: {{ .Values.database.port | quote }}
          - name: PGSSLMODE
            value: {{ .Values.database.sslMode | default "prefer" | quote }}
          - name: DB_NAME
            value: {{ .Values.database.name | quote }}
          - name: DB_USER
            value: {{ .Values.database.user | quote }}
          - name: DB_SUPERUSER
            value: {{ .Values.database.superuserName | default "postgres" | quote }}
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: {{ .Values.database.secretName }}
                key: {{ .Values.database.secretKey }}
        command:
          - sh
          - -c
          - |
            echo "Waiting for PostgreSQL at $DB_HOST to be available..."
            for i in $(seq 1 60); do
              if psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_SUPERUSER" -d postgres -c "SELECT 1;" > /dev/null 2>&1; then
                echo "PostgreSQL is up!"

                echo "Creating the database $DB_NAME if it doesn't exist..."
                psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_SUPERUSER" -d postgres \
                  --set=ON_ERROR_STOP=1 \
                  --set=db_name="$DB_NAME" <<'SQL'
            SELECT format('CREATE DATABASE %I', :'db_name')
            WHERE NOT EXISTS (
              SELECT 1 FROM pg_database WHERE datname = :'db_name'
            )
            \gexec
            SQL

                echo "Creating the user $DB_USER if it doesn't exist and applying grants..."
                psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_SUPERUSER" -d "$DB_NAME" \
                  --set=ON_ERROR_STOP=1 \
                  --set=db_name="$DB_NAME" \
                  --set=db_user="$DB_USER" \
                  --set=db_password="$DB_PASSWORD" <<'SQL'
            SELECT format('CREATE USER %I WITH PASSWORD %L', :'db_user', :'db_password')
            WHERE NOT EXISTS (
              SELECT 1 FROM pg_roles WHERE rolname = :'db_user'
            )
            \gexec

            GRANT ALL PRIVILEGES ON DATABASE :"db_name" TO :"db_user";
            GRANT USAGE ON SCHEMA public TO :"db_user";
            GRANT CREATE ON SCHEMA public TO :"db_user";
            ALTER DEFAULT PRIVILEGES IN SCHEMA public GRANT ALL ON TABLES TO :"db_user";
            SQL

                exit 0
              fi
              echo "Waiting for PostgreSQL... ($i/60)"
              sleep 5
            done
            echo "PostgreSQL did not become available in time."
            exit 1
      {{- else if .Values.postgresql.enabled }}
      # Wait for the automation's own PostgreSQL subchart to be ready
      - name: wait-for-postgres
        image: bitnamilegacy/postgresql:latest
        command: ['sh', '-c']
        args:
          - |
            DB_HOST="{{ .Values.database.host }}"
            echo "Waiting for PostgreSQL at $DB_HOST to be ready..."
            until PGPASSWORD=$AUTOMATION_DB_PASS psql -h $DB_HOST -p {{ .Values.database.port }} -U {{ .Values.database.user }} -c '\q' > /dev/null 2>&1; do
              echo "PostgreSQL is unavailable - sleeping for 2 seconds"
              sleep 2
            done
            echo "PostgreSQL is up and running!"
        env:
        {{- include "automation.env" . | nindent 8 }}
      {{- end }}
      - name: migrate
        image: '{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}'
        command: ["alembic", "upgrade", "head"]
        env:
        {{- include "automation.env" . | nindent 8 }}
      containers:
      - name: automation
        imagePullPolicy: Always
        image: '{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}'
        command: ["ddtrace-run"]
        args:
          - "uvicorn"
          - "openhands.automation.app:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
        ports:
        - containerPort: 8000
        resources:
          {{- toYaml .Values.deployment.resources | nindent 12 }}
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
        env:
        {{- include "automation.env" . | nindent 8 }}
        {{- if .Values.caBundle.enabled }}
        - name: SSL_CERT_FILE
          value: {{ .Values.caBundle.mountPath }}/{{ .Values.caBundle.key }}
        - name: REQUESTS_CA_BUNDLE
          value: {{ .Values.caBundle.mountPath }}/{{ .Values.caBundle.key }}
        {{- end }}
        {{- if .Values.caBundle.enabled }}
        volumeMounts:
        - name: openhands-ca-bundle
          mountPath: {{ .Values.caBundle.mountPath }}
          readOnly: true
        {{- end }}
