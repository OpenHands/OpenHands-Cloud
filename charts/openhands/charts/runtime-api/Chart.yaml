apiVersion: v2
name: runtime-api
description: A Helm chart for the FastAPI application
# Inert: embedded subchart of the openhands umbrella, not versioned or
# published on its own. Ships at whatever openhands version bundles it.
version: 0.0.0
appVersion: "1.0.0"
dependencies:
  - name: postgresql
    version: 15.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: helm-release-pruner
    version: 3.3.0
    repository: https://charts.fairwinds.com/stable
    condition: helm-release-pruner.enabled
