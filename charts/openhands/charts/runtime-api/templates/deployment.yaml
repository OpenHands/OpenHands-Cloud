apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "runtime-api.fullname" . }}
  labels:
    {{- include "runtime-api.labels" . | nindent 4 }}
spec:
  {{- if and (not .Values.autoscaling.enabled) .Values.replicaCount }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  minReadySeconds: {{ .Values.deployment.minReadySeconds }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.deployment.strategy.maxUnavailable }}
      maxSurge: {{ .Values.deployment.strategy.maxSurge }}
  selector:
    matchLabels:
      {{- include "runtime-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "runtime-api.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.warmRuntimes.enabled .Values.ingressBase.enabled .Values.caBundle.enabled }}
      volumes:
        {{- if .Values.warmRuntimes.enabled }}
        - name: warm-runtimes-config
          configMap:
            name: {{ .Values.warmRuntimes.configMapName }}
        {{- end }}
        {{- if .Values.ingressBase.enabled }}
        - name: ingress-base-config
          configMap:
            name: {{ include "runtime-api.fullname" . }}-ingress-base
        {{- end }}
        {{- if .Values.caBundle.enabled }}
        - name: openhands-ca-bundle
          configMap:
            name: {{ .Values.caBundle.name }}
        {{- end }}
      {{- end }}
      initContainers:
      {{- include "runtime-api.dbInitContainers" . | nindent 6 }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          env:
            {{- include "runtime-api.env" . | nindent 12 }}
            {{- if .Values.caBundle.enabled }}
            - name: SSL_CERT_FILE
              value: {{ .Values.caBundle.mountPath }}/{{ .Values.caBundle.key }}
            - name: REQUESTS_CA_BUNDLE
              value: {{ .Values.caBundle.mountPath }}/{{ .Values.caBundle.key }}
            {{- end }}
            - name: DB_POOL_SIZE
              value: {{ .Values.database.poolSize.api | default 5 | quote }}
            - name: DB_MAX_OVERFLOW
              value: {{ .Values.database.maxOverflow.api | default 10 | quote }}
            {{- if .Values.defaultAPIKeySecretName }}
            - name: DEFAULT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.defaultAPIKeySecretName }}
                  key: default-api-key
            {{- end }}
            
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: admin-password
                  key: admin-password
            

          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- if or .Values.warmRuntimes.enabled .Values.ingressBase.enabled .Values.caBundle.enabled }}
          volumeMounts:
          {{- if .Values.warmRuntimes.enabled }}
            - name: warm-runtimes-config
              mountPath: /config
          {{- end }}
          {{- if .Values.ingressBase.enabled }}
            - name: ingress-base-config
              mountPath: /ingress-base
          {{- end }}
          {{- if .Values.caBundle.enabled }}
            - name: openhands-ca-bundle
              mountPath: {{ .Values.caBundle.mountPath }}
              readOnly: true
          {{- end }}
          {{- end }}
