{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "runtime-api.fullname" . }}-ingress
  {{- $annotations := .Values.ingress.annotations }}
  {{- $middlewareAnnotation := include "runtime-api.pathMiddlewareAnnotation" . }}
  {{- if or $annotations $middlewareAnnotation }}
  annotations:
    {{- with $annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
    {{- if $middlewareAnnotation }}
    {{ $middlewareAnnotation | nindent 4 }}
    {{- end }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
  - hosts:
    - {{ include "runtime-api.ingressHost" . }}
    secretName: {{ .Values.ingress.tlsSecretName | default (printf "%s-tls" (include "runtime-api.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ include "runtime-api.ingressHost" . }}
      http:
        paths:
          - path: {{ include "runtime-api.routedPath" (dict "path" (.Values.ingress.path | default "/") "Values" .Values) }}
            pathType: {{ .Values.ingress.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ include "runtime-api.fullname" . }}
                port:
                  number: {{ .Values.service.port }}
{{- end }}
