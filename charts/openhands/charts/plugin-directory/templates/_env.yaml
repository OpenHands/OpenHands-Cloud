{{/*
  plugin-directory.env.server — Default environment variables for the server container
*/}}
{{- define "plugin-directory.env.server.defaults" }}
# Database configuration
- name: DB_HOST
  value: {{ .Values.database.host | quote }}
- name: DB_PORT
  value: {{ .Values.database.port | quote }}
- name: DB_SSL_MODE
  value: {{ .Values.database.sslMode | default "prefer" | quote }}
- name: PGSSLMODE
  value: {{ .Values.database.sslMode | default "prefer" | quote }}
- name: DB_USER
  value: {{ .Values.database.user | quote }}
- name: DB_NAME
  value: {{ .Values.database.name | quote }}
- name: DB_PASS
  valueFrom:
    secretKeyRef:
      name: {{ .Values.database.secretName }}
      key: {{ .Values.database.secretKey }}
- name: DATABASE_URL
  value: "postgresql://$(DB_USER):$(DB_PASS)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?sslmode=$(DB_SSL_MODE)"

# Application configuration
- name: MARKETPLACE_SOURCE
  value: {{ .Values.appEnv.MARKETPLACE_SOURCE | quote }}
- name: FEATURED_PLUGIN_IDS
  value: {{ .Values.appEnv.FEATURED_PLUGIN_IDS | quote }}
- name: LOG_LEVEL
  value: {{ .Values.appEnv.LOG_LEVEL | quote }}

# Authentication
- name: IDENTITY_SHARED_SECRET
  valueFrom:
    secretKeyRef:
      name: {{ .Values.auth.existingSecret }}
      key: {{ .Values.auth.identitySharedSecretKey }}
- name: SESSION_SECRET
  valueFrom:
    secretKeyRef:
      name: {{ .Values.auth.existingSecret }}
      key: {{ .Values.auth.sessionSecretKey }}

{{- if .Values.datadog.enabled }}
# Datadog configuration
- name: DD_ENV
  value: {{ .Values.datadog.env | quote }}
{{- end }}
{{- end }}

{{/*
  plugin-directory.env.server — Deduplicated environment variable list for server.

  Merges defaults with .Values.env so user-supplied entries take precedence:
    1. Build a set of names provided in .Values.env.
    2. Drop any default whose name is in that set.
    3. Append the .Values.env entries.
  Result: each name appears once, with the user's value if provided.
*/}}
{{- define "plugin-directory.env.server" }}
{{- $defaults := include "plugin-directory.env.server.defaults" . | fromYamlArray }}
{{- $overrideKeys := dict }}
{{- if .Values.env }}
{{- range $key, $_ := .Values.env }}
{{- $_ := set $overrideKeys $key true }}
{{- end }}
{{- end }}
{{- $filtered := list }}
{{- range $entry := $defaults }}
{{- if not (hasKey $overrideKeys (get $entry "name")) }}
{{- $filtered = append $filtered $entry }}
{{- end }}
{{- end }}
{{- if .Values.env }}
{{- range $key, $value := .Values.env }}
{{- $filtered = append $filtered (dict "name" $key "value" ($value | toString)) }}
{{- end }}
{{- end }}
{{- $filtered | toYaml }}
{{- end }}

{{/*
  plugin-directory.env.client — Default environment variables for the client container
*/}}
{{- define "plugin-directory.env.client.defaults" }}
# Application URL
- name: APP_URL
  value: {{ .Values.appUrl | quote }}

# Base URL the SSR loader uses to reach FastAPI. Defaults to the sidecar
# server at localhost:8000 (shared pod network); override via
# .Values.apiUrl when the server runs under a different in-cluster DNS
# name or port.
- name: API_URL
  value: {{ .Values.apiUrl | quote }}

# Base URL for the "Create New Conversation" button. Defaults to "/" in
# values.yaml (same origin as the plugin directory); set an absolute URL
# to point at a different OpenHands host, or "" to hide the button.
- name: CONVERSATION_URL
  value: {{ .Values.conversationUrl | quote }}

# Base URL shown inside the curl command example on plugin detail pages.
# Empty hides the block.
- name: CURL_API_URL
  value: {{ .Values.curlApiUrl | quote }}

# Authentication - shared secret for server communication
- name: IDENTITY_SHARED_SECRET
  valueFrom:
    secretKeyRef:
      name: {{ .Values.auth.existingSecret }}
      key: {{ .Values.auth.identitySharedSecretKey }}

# Session secret for cookie encryption
- name: SESSION_SECRET
  valueFrom:
    secretKeyRef:
      name: {{ .Values.auth.existingSecret }}
      key: {{ .Values.auth.sessionSecretKey }}

# OIDC configuration — reuse the existing allhands Keycloak client
# (same client the main openhands app uses) rather than registering
# a dedicated plugin-directory client. Matches the laminar pattern.
- name: AUTH_PROTOCOL
  value: "oidc"
- name: KEYCLOAK_REALM_NAME
  valueFrom:
    secretKeyRef:
      name: {{ .Values.oidc.realmSecretName }}
      key: {{ .Values.oidc.realmSecretKey }}
- name: OIDC_ISSUER_URL
  value: "{{ .Values.oidc.issuerUrl }}/realms/$(KEYCLOAK_REALM_NAME)"
- name: OIDC_CLIENT_ID
  valueFrom:
    secretKeyRef:
      name: {{ .Values.oidc.realmSecretName }}
      key: {{ .Values.oidc.clientIdKey }}
- name: OIDC_CLIENT_SECRET
  valueFrom:
    secretKeyRef:
      name: {{ .Values.oidc.realmSecretName }}
      key: {{ .Values.oidc.clientSecretKey }}

{{- if .Values.datadog.enabled }}
# Datadog configuration
- name: DD_ENV
  value: {{ .Values.datadog.env | quote }}
{{- end }}
{{- end }}

{{/*
  plugin-directory.env.client — Deduplicated environment variable list for client.
  Same merge semantics as plugin-directory.env.server above: .Values.env wins
  on name collisions, defaults fill in the rest.
*/}}
{{- define "plugin-directory.env.client" }}
{{- $defaults := include "plugin-directory.env.client.defaults" . | fromYamlArray }}
{{- $overrideKeys := dict }}
{{- if .Values.env }}
{{- range $key, $_ := .Values.env }}
{{- $_ := set $overrideKeys $key true }}
{{- end }}
{{- end }}
{{- $filtered := list }}
{{- range $entry := $defaults }}
{{- if not (hasKey $overrideKeys (get $entry "name")) }}
{{- $filtered = append $filtered $entry }}
{{- end }}
{{- end }}
{{- if .Values.env }}
{{- range $key, $value := .Values.env }}
{{- $filtered = append $filtered (dict "name" $key "value" ($value | toString)) }}
{{- end }}
{{- end }}
{{- $filtered | toYaml }}
{{- end }}
