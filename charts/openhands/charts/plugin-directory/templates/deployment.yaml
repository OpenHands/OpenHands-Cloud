apiVersion: apps/v1
kind: Deployment
metadata:
  name: plugin-directory
  labels:
    app: plugin-directory
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app: plugin-directory
  template:
    metadata:
      labels:
        app: plugin-directory
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      {{- include "plugin-directory.dbInitContainers" . | nindent 6 }}
      containers:
      # Server container (FastAPI backend)
      - name: server
        image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
        imagePullPolicy: Always
        ports:
          - name: api
            containerPort: 8000
            protocol: TCP
        env:
        {{- include "plugin-directory.env.server" . | nindent 8 }}
        resources:
          {{- toYaml .Values.server.resources | nindent 10 }}
        startupProbe:
          httpGet:
            path: /health/live
            port: 8000
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8000
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}

      # Client container (React Router SSR)
      - name: client
        image: "{{ .Values.client.image.repository }}:{{ .Values.client.image.tag }}"
        imagePullPolicy: Always
        ports:
          - name: http
            containerPort: 3000
            protocol: TCP
        env:
        {{- include "plugin-directory.env.client" . | nindent 8 }}
        resources:
          {{- toYaml .Values.client.resources | nindent 10 }}
        startupProbe:
          httpGet:
            path: /plugins/health/live
            port: 3000
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
        livenessProbe:
          httpGet:
            path: /plugins/health/live
            port: 3000
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
        readinessProbe:
          httpGet:
            path: /plugins/health/ready
            port: 3000
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
