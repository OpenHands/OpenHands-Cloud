apiVersion: v1
kind: Service
metadata:
  name: plugin-directory
  labels:
    app: plugin-directory
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: http
      protocol: TCP
      name: http
    - port: 8000
      targetPort: api
      protocol: TCP
      name: api
  selector:
    app: plugin-directory
