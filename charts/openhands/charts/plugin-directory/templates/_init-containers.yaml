{{- define "plugin-directory.dbInitContainers" }}
{{- if .Values.databaseMigrations.waitForDatabase }}
- name: wait-for-db
  image: "bitnamilegacy/postgresql:latest"
  command: ['sh', '-c']
  args:
    - |
      echo "Waiting for PostgreSQL at $DB_HOST to be ready..."
      until PGPASSWORD=$DB_PASS pg_isready -h $DB_HOST -p $DB_PORT -U $DB_USER -d $DB_NAME > /dev/null 2>&1; do
        echo "PostgreSQL is unavailable - sleeping for 2 seconds"
        sleep 2
      done
      echo "PostgreSQL is up and running!"
  env:
    {{- include "plugin-directory.env.server" . | nindent 4 }}
{{- end }}
{{- if .Values.databaseMigrations.createDatabases }}
- name: create-db
  image: "bitnamilegacy/postgresql:latest"
  command: ['sh', '-c']
  args:
    - |
      export PGPASSWORD=$DB_PASS
      PSQL="psql -h $DB_HOST -p $DB_PORT -U $DB_USER"

      echo "Ensuring database \"$DB_NAME\" exists..."
      $PSQL -d postgres -tc "SELECT 1 FROM pg_database WHERE datname='$DB_NAME'" | grep -q 1 || \
      $PSQL -d postgres -c "CREATE DATABASE $DB_NAME;"
  env:
    {{- include "plugin-directory.env.server" . | nindent 4 }}
{{- end }}
{{- if .Values.databaseMigrations.migrate }}
- name: migrate-db
  image: "{{ .Values.server.image.repository }}:{{ .Values.server.image.tag }}"
  command: ["alembic", "upgrade", "head"]
  env:
    {{- include "plugin-directory.env.server" . | nindent 4 }}
{{- end }}
{{- end }}
