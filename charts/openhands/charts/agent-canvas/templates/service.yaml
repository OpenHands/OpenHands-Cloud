apiVersion: v1
kind: Service
metadata:
  name: agent-canvas
  labels:
    {{- include "agent-canvas.labels" . | nindent 4 }}
    app: agent-canvas
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: agent-canvas
