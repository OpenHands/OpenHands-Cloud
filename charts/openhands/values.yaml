  auth:
    existingSecret: azuredevops-app

# Plugin Directory subchart configuration
# When enabled, deploys the plugin directory marketplace as a subchart
# The plugin directory allows users to discover, browse, and review agent plugins
# Routing is handled by parent chart via /plugins subpath
plugin-directory:
  enabled: false

  databaseMigrations:
    waitForDatabase: true
    createDatabases: false
    migrate: true

  client:
    image:
      repository: ghcr.io/openhands/plugin-directory-client
      # tag: set via helm args or override

  server:
    image:
      repository: ghcr.io/openhands/plugin-directory-server
      # tag: set via helm args or override

  imagePullSecrets: []

  deployment:
    replicas: 1

  # Application environment variables
  appEnv:
    MARKETPLACE_SOURCE: ""
    FEATURED_PLUGIN_IDS: ""
    LOG_LEVEL: "INFO"

  # App URL - set by parent chart based on ingress configuration
  appUrl: ""

  # PostgreSQL database configuration
  database:
    # Full hostname of the PostgreSQL server
    # When deployed as subchart, this is set by parent chart
    host: ""
    port: "5432"
    user: "postgres"
    name: "plugindir"
    secretName: "postgres-password"
    secretKey: "password"

  # Authentication configuration
  auth:
    existingSecret: plugin-directory-secrets
    identitySharedSecretKey: identity-shared-secret
    sessionSecretKey: session-secret

  # OIDC configuration — reuses the allhands Keycloak client via the
  # shared keycloak-realm secret (same client the main app uses).
  oidc:
    issuerUrl: ""
    realmSecretName: "keycloak-realm"
    realmSecretKey: "realm-name"
    clientIdKey: "client-id"
    clientSecretKey: "client-secret"

  # Datadog configuration
  datadog:
    enabled: false
    env: "dev"

  # Env vars passed directly to containers (overrides defaults)
  env: {}

automationServiceKey:
  enabled: false
  existingSecret: automation-service-key
  secretKey: automation-service-key

# Automation service configuration for event forwarding
automationService:
  # URL of the automation service (e.g., https://staging.all-hands.dev/api/automation)
  url: ""
  # Enable forwarding events to the automation service
  eventForwardingEnabled: false

# Automation webhook secret for verifying webhook signatures
automationWebhookSecret:
  enabled: false
  existingSecret: automation-webhook-secret
  secretKey: webhook-secret

# Automation subchart configuration
# When enabled, deploys the automation service as a subchart
# The automation service handles scheduled and event-driven automation execution
# Routing is handled by parent chart via /api/automation subpath
automation:
  enabled: false
  
  image:
    repository: ghcr.io/openhands/automation
    # tag: set via helm args or override
  
  imagePullSecrets: []
  
  deployment:
    replicas: 1
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m
  
  # Separate deployment for handling webhook events
  # Routes /v1/events/* traffic to dedicated pods for better isolation and scalability
  events:
    enabled: false
    deployment:
      replicas: 2
      resources:
        requests:
          memory: 256Mi
          cpu: 100m
        limits:
          memory: 512Mi
          cpu: 500m
    uvicorn:
      workers: 2
  
  securityContext:
    runAsUser: 42420
    runAsGroup: 42420
    runAsNonRoot: true
  
  serviceAccount:
    create: true
    name: automation-sa
    annotations: {}
  
  probes:
    startup:
      failureThreshold: 30
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 10
      periodSeconds: 30
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3
  
  # URL configuration
  # OpenHands API URL for dispatching sandbox runs (e.g., https://staging.all-hands.dev)
  openhandsApiUrl: ""
  # Automation service base URL for completion callbacks (e.g., https://staging.all-hands.dev/api/automation)
  automationBaseUrl: ""
  
  # PostgreSQL database configuration
  database:
    # Full hostname of the PostgreSQL server
    # Examples:
    #   - Cloud SQL: "my-project:us-central1:my-instance"
    #   - In-cluster: "openhands-main-postgresql"
    #   - Feature env: "openhands-feature-branch-postgresql"
    host: ""
    port: "5432"
    user: "automation_user"
    name: "automations"
    # Secret containing the automation database password
    secretName: "automation-db-secret"
    secretKey: "db-password"
    # Create database and user in an existing PostgreSQL instance
    # When true, runs an init container to create the database and user
    # Useful when sharing a PostgreSQL instance with other services
    createDatabaseUser: false
    # Superuser used to create the automation database and user.
    # Defaults to "postgres" but must be overridden when the external PostgreSQL
    # admin account uses a different name.
    # Only used when createDatabaseUser=true
    superuserName: "postgres"
    # Secret containing the postgres superuser password (for creating the automation user)
    # Only used when createDatabaseUser=true
    superuserSecretName: "postgres-password"
    superuserSecretKey: "password"
  
  # GCP Cloud SQL (leave empty for non-GCP)
  gcp:
    dbInstance: ""
    project: ""
    region: ""
  
  # File storage configuration (aligned with openhands chart pattern)
  # Supports multiple backends: gcs, s3, or in-cluster minio for ephemeral environments
  filestore:
    # When true, uses S3-compatible storage (minio) for ephemeral/feature environments
    # When false, uses cloud storage specified by 'type' (for production)
    ephemeral: false
    # Bucket name for storing automation data
    bucket: automation-data
    # Storage type when ephemeral=false (e.g., gcs, s3)
    type: gcs
  
  # Minio configuration for ephemeral storage
  # When deployed as subchart of openhands, automation uses parent's minio instance
  minio:
    # Don't deploy minio as subchart - use parent's minio instance
    enabled: false
    # External minio configuration (points to parent chart's minio)
    external:
      endpoint: "http://minio:9000"
      accessKey: "default"
      secretKey: "notasecret"
  
  # Service key from K8s secret
  serviceKeyFromSecret:
    name: automation-service-key
    key: automation-service-key
  
  # Datadog configuration
  datadog:
    env: "dev"
  
  # Env vars passed directly to the container (overrides defaults)
  env: {}
  
  # PostgreSQL subchart - disabled when using parent's PostgreSQL
  postgresql:
    enabled: false

replicated:
  enabled: false
  # Database credentials below are rendered only into the support-bundle Secret
  # (gated on replicated.enabled), following the same convention as the rest of
  # replicated/openhands.yaml — the Replicated installer templates ConfigOption
  # values into Secrets at install time. The troubleshoot v1beta2 redis/postgres
  # collectors have no secretRef field, so auth must be inlined into the URI.
  redisPassword: ""
  postgresUsername: ""
  postgresPassword: ""
  postgresDatabase: ""

global:
  security:
    # This allows using the bitnamilegacy image repo.
    # See: https://github.com/bitnami/containers/issues/83267
    allowInsecureImages: true

vertexAI:
  enabled: false
  project: ""

# Trust-manager Bundle that fans a CA bundle (public CAs + an optional
# operator-supplied CA certificate) out as a ConfigMap into the release
# namespace. Consumers (openhands deployments + outbound-HTTPS cronjobs,
# litellm, keycloak) mount this ConfigMap to trust the operator's internal
# CAs.
#
# REQUIRES trust-manager (https://cert-manager.io/docs/projects/trust-manager/)
# to be installed in the cluster. Disabled by default; set enabled: true only
# if you have trust-manager. When enabling, you must also pass these subchart
# overrides (the parent chart can't template them through subchart values):
#
#   keycloak:
#     extraEnvVars:
#       - { name: KC_TRUSTSTORE_PATHS, value: /etc/openhands/ca-bundle/ca-bundle.crt }
#     extraVolumes:
#       - { name: openhands-ca-bundle, configMap: { name: openhands-ca-bundle } }
#     extraVolumeMounts:
#       - { name: openhands-ca-bundle, mountPath: /etc/openhands/ca-bundle, readOnly: true }
#   litellm-helm:
#     envVars:
#       SSL_CERT_FILE:      /etc/openhands/ca-bundle/ca-bundle.crt
#       REQUESTS_CA_BUNDLE: /etc/openhands/ca-bundle/ca-bundle.crt
#     volumes:
#       - { name: openhands-ca-bundle, configMap: { name: openhands-ca-bundle } }
#     volumeMounts:
#       - { name: openhands-ca-bundle, mountPath: /etc/openhands/ca-bundle, readOnly: true }
caBundle:
  enabled: false
  name: openhands-ca-bundle
  key: ca-bundle.crt
  mountPath: /etc/openhands/ca-bundle
  includeDefaultCAs: true
  # Populated from the Replicated TLS CA certificate config option when
  # running under Replicated. Optional otherwise.
  userCA: ""

# Pre-install/pre-upgrade hook that waits for required CRDs to be Established
# before the openhands chart renders its own traefik/cert-manager resources.
# Disabled by default — enable only if you've installed cert-manager,
# trust-manager, traefik, etc. in the cluster, and supply the CRD list to
# wait on. The Replicated layer enables this and supplies the list.
crdCheck:
  enabled: false
  timeout: 120s
  backoffLimit: 6
  crds: []
  image:
    repository: docker.io/rancher/kubectl
    tag: v1.33.0
    pullPolicy: IfNotPresent
  imagePullSecrets: []
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 128Mi
  location: ""

# Integrations Hub - Agent context layer with managed connectors and MCP integrations
integrations-hub:
  enabled: false

  image:
    repository: ghcr.io/openhands/integrations-hub
    # tag: set via helm args or override

  imagePullSecrets: []

  deployment:
    replicas: 1
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

  securityContext:
    runAsUser: 42420
    runAsGroup: 42420
    runAsNonRoot: true

  serviceAccount:
    create: true
    name: integrations-hub-sa
    annotations: {}

  probes:
    startup:
      failureThreshold: 30
      periodSeconds: 10
    liveness:
      initialDelaySeconds: 10
      periodSeconds: 30
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 10
      failureThreshold: 3

  # Service configuration
  service:
    baseUrl: ""
    # Port the FastAPI container listens on (matches the integrations-hub
    # Dockerfile's `EXPOSE 8000` on the development branch).
    port: 8000

  # Path prefix that the hub is mounted under. This single value drives
  # three things at once and they MUST agree:
  #   - The parent chart's `templates/ingress-integrations-hub.yaml`
  #     routing rule (host-based ingress + this path).
  #   - The FastAPI container's `INTHUB_ROOT_PATH` env var, which causes
  #     `backend/app/main.py::build_app` to mount every route under the
  #     prefix.
  #   - The Next.js SPA's `NEXT_PUBLIC_BASE_PATH`, which is baked into
  #     the image at build time (default `/integrations-hub` in the
  #     project Dockerfile). Override the image's build arg if you set a
  #     different rootPath here.
  rootPath: "/integrations-hub"

  # Bypass authentication for local development only -- never enable in
  # staging/production. Exposed as INTHUB_DISABLE_AUTH.
  disableAuth: false

  # OpenHands identity provider used to validate session cookies / API keys.
  openhands:
    # Backend env var: INTHUB_OPENHANDS_BASE_URL (falls back to the global
    # ingress host when left empty -- see charts/integrations-hub/templates/_env.yaml).
    baseUrl: ""
    # Backend env var: INTHUB_OPENHANDS_AUTH_COOKIE_NAME
    authCookieName: "keycloak_auth"
    # Stable-origin URL used as the OAuth callback proxy for preview
    # deployments. Backend env var: AUTH_REDIRECT_PROXY_URL.
    redirectProxyUrl: ""
    # Optional callback target for preview deployments paired with
    # redirectProxyUrl. Backend env var: AUTH_URL.
    authUrl: ""

  # Credential encryption key configuration.
  # Backend env var: INTHUB_CREDENTIAL_ENCRYPTION_KEY.
  credentialEncryption:
    secretName: "integrations-hub-encryption-secret"
    secretKey: "encryption-key"

  # Optional internal service-to-service auth secret. Only needed when a
  # Next.js proxy in front of FastAPI injects X-Integrations-Hub-Internal-Secret;
  # in pure SPA + FastAPI K8s deployments this is unused. Leave
  # internalSecretName empty to skip wiring INTHUB_INTERNAL_AUTH_SECRET.
  auth:
    internalSecretName: ""
    internalSecretKey: "internal-auth-secret"

  # Admin allowlist for /api/admin/* routes.
  # Backend env var: APP_ADMIN_EMAILS (comma-separated).
  admin:
    emails: ""

  # PostgreSQL database configuration. The backend reads a single
  # connection URL via INTHUB_POSTGRES_URL; the chart builds it from the
  # components below using $(VAR_NAME) expansion in templates/_env.yaml.
  # Set `database.url` to bypass that builder and supply a pre-formed URL.
  database:
    url: ""
    host: ""
    port: "5432"
    user: "integrations_hub_user"
    name: "integrations_hub"
    secretName: "integrations-hub-db-secret"
    secretKey: "db-password"
    existingSecret: false
    createDatabaseUser: false
    superuserSecretName: "postgres-password"
    superuserSecretKey: "password"

  # GCP Cloud SQL (leave empty for non-GCP)
  gcp:
    dbInstance: ""
    project: ""
    region: ""

  # Datadog configuration
  datadog:
    enabled: false
    env: "dev"
    serviceName: "integrations-hub"

  # Cron job configuration
  cron:
    secretName: "integrations-hub-cron-secret"
    secretKey: "cron-secret"

  # Env vars passed directly to the container
  env: {}

  # PostgreSQL subchart - disabled when using parent's PostgreSQL
  postgresql:
    enabled: false
