## Chart dependency configurations

keycloak:
  enabled: false
  url: "http://keycloak"
  fullnameOverride: keycloak
  replicaCount: 1
  production: true
  proxyHeaders: forwarded
  ingress:
    enabled: false
    # REQUIRED: Update to a hostname in a DNS domain you own
    # hostname: auth.app.example.com
    servicePort: 80
    tls: true
    annotations: {}
      # UPDATE: if you use cert-manager, enter your clusterIssuer may not match.
      # cert-manager.io/cluster-issuer: letsencrypt-production
    ingressClassName: traefik
  auth:
    adminUser: tmpadmin
    existingSecret: keycloak-admin
    passwordSecretKey: admin-password
  service:
    type: ClusterIP
  serviceAccount:
    name: "keycloak-sa"
  postgresql:
    enabled: false
  externalDatabase:
    host: oh-main-postgresql
    database: bitnami_keycloak
    existingSecret: postgres-password
    existingSecretUserKey: username
    existingSecretPasswordKey: password
  extraEnvVars:
    - name: KC_FEATURES
      value: token-exchange,admin-fine-grained-authz
    - name: KC_HTTP_ENABLED
      value: "true"
    - name: KC_PROXY_HEADERS
      value: "xforwarded"
    - name: KC_SPI_LOGIN_PROTOCOL_OPENID_CONNECT_LEGACY_LOGOUT_REDIRECT_URI
      value: "true"
  image:
    repository: bitnamilegacy/keycloak
  waitForDb:
    image: "bitnamilegacy/postgresql:latest"
  initContainers:
    - name: wait-for-db
      # The Bitnami Keycloak subchart renders initContainers through common.tplvalues.render,
      # so this template expression is evaluated at deploy time rather than being treated as
      # a literal string. This lets us override just the image (e.g. for Replicated proxy)
      # without duplicating the entire init container.
      image: '{{ .Values.waitForDb.image }}'
      command: ['sh', '-c']
      args:
        - |
          echo "Waiting for database \"$KEYCLOAK_DATABASE_NAME\" at $KEYCLOAK_DATABASE_HOST:$KEYCLOAK_DATABASE_PORT..."
          until PGPASSWORD=$DB_PASS pg_isready -h "$KEYCLOAK_DATABASE_HOST" -p "$KEYCLOAK_DATABASE_PORT" -U "$DB_USER" -d "$KEYCLOAK_DATABASE_NAME" > /dev/null 2>&1; do
            echo "PostgreSQL is unavailable - sleeping 5s"
            sleep 5
          done
          echo "PostgreSQL is ready, checking database exists..."
          until PGPASSWORD=$DB_PASS psql -h "$KEYCLOAK_DATABASE_HOST" -p "$KEYCLOAK_DATABASE_PORT" -U "$DB_USER" -d "$KEYCLOAK_DATABASE_NAME" -c "SELECT 1" > /dev/null 2>&1; do
            echo "Database \"$KEYCLOAK_DATABASE_NAME\" not ready - sleeping 5s"
            sleep 5
          done
          echo "Database \"$KEYCLOAK_DATABASE_NAME\" is ready!"
      envFrom:
        - configMapRef:
            name: keycloak-env-vars
      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: postgres-password
              key: username
        - name: DB_PASS
          valueFrom:
            secretKeyRef:
              name: postgres-password
              key: password

laminar:
  # Enable this if you want to use laminar
  enabled: false
  global:
    # Upstream laminar uses this to choose provider-specific defaults for
    # frontend ingress, app-server exposure, and storage class settings.
    # Set to "gcp" or "aws"; it is not auto-detected, and empty falls back
    # to AWS defaults.
    cloudProvider: ""

  # Laminar project API key from K8s secret
  # Used for Laminar monitoring/analytics
  apiKeyFromSecret:
    name: lmnr-project-api-key
    key: LMNR_PROJECT_API_KEY

  # Laminar base URL from K8s secret
  # Used for Laminar monitoring/analytics
  baseUrlFromSecret:
    name: lmnr-base-url
    key: LMNR_BASE_URL

  # Force HTTP instead of HTTPS for Laminar connections
  # Useful for development/test environments without TLS
  forceHttp: true

  # HTTP port for Laminar app server (default: 443)
  # Set to 8000 for self-hosted environments where laminar exposes HTTP on port 8000
  httpPort: null

  frontend:
    ingress:
      enabled: true          # required gate in 0.1.8; must be true for any frontend ingress to render
      hostname: ""
      className: ""
      externalDns:
        enabled: false
      tls:
        enabled: false
        secretName: "laminar-frontend-tls"
        clusterIssuer: ""
      annotations: {}

  appServer:
    # loadBalancer creates an L4 Network Load Balancer Service for the app-server (OTLP trace ingestion).
    # Use this on AWS (NLB) where runtimes send traces directly over TCP.
    # On GCP, use appServer.ingress instead (L7 via traefik/GCE ingress).
    loadBalancer:
      enabled: false
      # When set, external-dns will create a DNS record pointing to the LoadBalancer IP/hostname.
      hostname: ""
      annotations: {}
    ingress:
      hostname: ""
      className: ""
      externalDns:
        enabled: false
      tls:
        enabled: false
        secretName: "laminar-app-server-tls"
        clusterIssuer: ""
      annotations: {}

  # Pin to laminar 0.1.9's default. K8s forbids changing StatefulSet
  # volumeClaimTemplates in place; the 0.1.10 default of 100Gi breaks
  # `helm upgrade` with "spec: Forbidden". With replicaCount: 1 this
  # value only describes the template, never new replicas.
  #
  # To grow rabbitmq disk where size is actually enforced (e.g. GKE
  # hyperdisk-balanced), patch the live PVC out of band with
  # `kubectl patch pvc`. On Replicated's openebs-hostpath this is a
  # no-op — the LocalPV-hostpath provisioner has no resize handler
  # and hostpath capacity is metadata only.
  rabbitmq:
    persistence:
      size: "50Gi"

litellm-helm:
  # Set this to false if you are using your own litellm instance
  # NOTE: We recommend using the provided LiteLLM instance (enabled: true) for simplicity
  # and because it is the most extensively tested scenario. Our automation uses an admin key
  # to do user management for the LiteLLM instance.
  enabled: false
  masterkeySecretName: lite-llm-api-key
  masterkeySecretKey: lite-llm-api-key
  environmentSecrets: [litellm-env-secrets]
  # Migrations run automatically when litellm starts. This disables running them separately as a job.
  migrationJob:
    enabled: false
  db:
    deployStandalone: false
    useExisting: true
    database: litellm
    endpoint: "oh-main-postgresql"
    secret:
      name: postgres-password
      usernameKey: username
      passwordKey: password
  ingress:
    enabled: false
    className: traefik
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-production
    hosts:
    # REQUIRED: Update to a hostname in a DNS domain you own
    # - host: llm-proxy.example.com
    #   paths:
    #   - path: /
    #     pathType: Prefix
    tls:
      - secretName: llm-proxy-tls
        # REQUIRED: Update to match the hostname you set above
        hosts:
          - llm-proxy.example.com
  proxy_config:
    environment_variables:
      {
        "OR_APP_NAME": "OpenHands",
        "OR_SITE_URL": "https://docs.all-hands.dev",
      }
    model_list:
    # UPDATE to use models that you have access to and have an API key stored in the litellm-env-secrets secret
    # - model_name: "prod/claude-3-5-sonnet-20241022"
    #   litellm_params:
    #     model: "anthropic/claude-3-5-sonnet-20241022"
    #     api_key: os.environ/ANTHROPIC_API_KEY
    # - model_name: "prod/claude-3-7-sonnet-20250219"
    #   litellm_params:
    #     model: "anthropic/claude-3-7-sonnet-20250219"
    #     api_key: os.environ/ANTHROPIC_API_KEY
    litellm_settings:
      num_retries: 3
      request_timeout: 600
      context_window_fallbacks: []
      allowed_fails: 3

