apiVersion: v2
description: OpenHands is an AI-driven autonomous software engineer
name: openhands
appVersion: cloud-1.34.0
version: 0.7.35
maintainers:
  - name: rbren
  - name: xingyao
  - name: tofarr
dependencies:
  - name: keycloak
    version: 24.7.5
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: keycloak.enabled
  - name: laminar
    repository: https://lmnr-ai.github.io/lmnr-helm
    version: 0.1.13
    condition: laminar.enabled
  - name: litellm-helm
    repository: oci://ghcr.io/berriai
    version: 0.1.831
    condition: litellm-helm.enabled
  - name: minio
    version: 5.0.10
    condition: filestore.ephemeral
    repository: https://charts.min.io/
  - name: postgresql
    version: 15.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
  - name: redis
    version: 20.3.0
    repository: oci://registry-1.docker.io/bitnamicharts
    condition: redis.enabled
  - name: replicated
    repository: oci://registry.replicated.com/library
    version: 1.9.0
    condition: replicated.enabled
  - name: runtime-api
    repository: oci://ghcr.io/openhands/helm-charts
    version: 0.3.5
    condition: runtime-api.enabled
  - name: automation
    repository: oci://ghcr.io/openhands/helm-charts
    version: 0.1.10
    condition: automation.enabled
  - name: crd-check
    repository: oci://ghcr.io/openhands/helm-charts
    version: 0.1.0
  - name: plugin-directory
    repository: oci://ghcr.io/openhands/helm-charts
    version: 0.1.1
    condition: plugin-directory.enabled
  - name: integrations-hub
    repository: oci://ghcr.io/openhands/helm-charts
    version: 0.1.0
    condition: integrations-hub.enabled
