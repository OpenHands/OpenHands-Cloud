{{- define "openhands.env.defaults" }}
{{- $integrations := .Values.integrations | default dict }}
- name: RUNTIME
  value: remote
- name: OH_SANDBOX_SPEC_KIND
  value: openhands.app_server.sandbox.dynamic_remote_sandbox_spec_service.DynamicRemoteSandboxSpecServiceInjector
- name: OH_SANDBOX_SPEC_DEFAULT_SPEC_NAME
  value: v1_current
- name: OPENHANDS_CONFIG_CLS
  value: {{ .Values.appConfig.OPENHANDS_CONFIG_CLS }}
- name: OPENHANDS_GITHUB_SERVICE_CLS
  value: {{ .Values.appConfig.OPENHANDS_GITHUB_SERVICE_CLS }}
- name: OPENHANDS_GITLAB_SERVICE_CLS
  value: {{ .Values.appConfig.OPENHANDS_GITLAB_SERVICE_CLS }}
{{- if .Values.bitbucket.enabled }}
- name: OPENHANDS_BITBUCKET_SERVICE_CLS
  value: {{ .Values.appConfig.OPENHANDS_BITBUCKET_SERVICE_CLS }}
{{- end }}
{{- if .Values.bitbucketDataCenter.enabled }}
- name: OPENHANDS_BITBUCKET_DATA_CENTER_SERVICE_CLS
  value: {{ .Values.appConfig.OPENHANDS_BITBUCKET_DATA_CENTER_SERVICE_CLS }}
{{- end }}
{{- if .Values.azureDevOps.enabled }}
- name: OPENHANDS_AZURE_DEVOPS_SERVICE_CLS
  value: {{ .Values.appConfig.OPENHANDS_AZURE_DEVOPS_SERVICE_CLS }}
{{- end }}
- name: OPENHANDS_MCP_CONFIG_CLS
  value: {{ .Values.appConfig.OPENHANDS_MCP_CONFIG_CLS }}
- name: OPENHANDS_CONVERSATION_VALIDATOR_CLS
  value: {{ .Values.appConfig.OPENHANDS_CONVERSATION_VALIDATOR_CLS }}
- name: OPENHANDS_EXPERIMENT_MANAGER_CLS
  value: {{ .Values.appConfig.OPENHANDS_EXPERIMENT_MANAGER_CLS }}
- name: OH_RESOLVER_LABEL
  value: {{ get $integrations "resolverLabel" | default "openhands" | quote }}
- name: LOG_JSON # Configure structured logging for Google Cloud
  value: '1'
- name: LOG_JSON_LEVEL_KEY
  value: 'severity'
{{- if .Values.appConfig.POSTHOG_CLIENT_KEY }}
- name: POSTHOG_CLIENT_KEY
  value: {{ .Values.appConfig.POSTHOG_CLIENT_KEY }}
{{- end }}

- name: FILE_STORE_PATH
  value: {{ .Values.filestore.bucket }}
- name: SANDBOX_KEEP_RUNTIME_ALIVE
  value: 'true'
- name: SANDBOX_CLOSE_DELAY
  value: "1800"
{{- if .Values.filestore.ephemeral }}
- name: FILE_STORE
  value: s3
- name: AWS_ACCESS_KEY_ID
  value: {{ (index .Values.minio.svcaccts 0).accessKey }}
- name: AWS_SECRET_ACCESS_KEY
  value: {{ (index .Values.minio.svcaccts 0).secretKey }}
- name: AWS_S3_ENDPOINT
  value: {{ printf "http://%s-minio:9000" $.Release.Name }}
- name: AWS_S3_BUCKET
  value: {{ .Values.filestore.bucket }}
- name: AWS_S3_SECURE
  value: 'false'
{{- else if or (eq (.Values.filestore.type | default "") "s3") .Values.filestore.existingSecret .Values.filestore.region .Values.filestore.endpoint }}
# External S3 (or S3-compatible) object store — the durable alternative to the
# bundled MinIO. Engaged by filestore.type=s3 or any external marker
# (existingSecret / region / endpoint). The app's S3FileStore uses boto3, so
# credentials come from filestore.existingSecret when set, otherwise from the
# pod's ambient AWS identity (IRSA / Pod Identity / instance profile). Unlike the
# ephemeral branch, AWS_S3_ENDPOINT is left unset for real AWS so boto3 targets
# the regional endpoint instead of being pinned to MinIO.
- name: FILE_STORE
  value: s3
- name: AWS_S3_BUCKET
  value: {{ .Values.filestore.bucket | quote }}
{{- if .Values.filestore.region }}
- name: AWS_REGION
  value: {{ .Values.filestore.region | quote }}
{{- end }}
{{- if .Values.filestore.endpoint }}
- name: AWS_S3_ENDPOINT
  value: {{ .Values.filestore.endpoint | quote }}
{{- end }}
{{- $secure := .Values.filestore.secure }}
{{- if kindIs "invalid" $secure }}{{- $secure = true }}{{- end }}
- name: AWS_S3_SECURE
  value: {{ $secure | quote }}
{{- if .Values.filestore.existingSecret }}
- name: AWS_ACCESS_KEY_ID
  valueFrom:
    secretKeyRef:
      name: {{ .Values.filestore.existingSecret }}
      key: {{ .Values.filestore.accessKeyIdKey | default "AWS_ACCESS_KEY_ID" }}
- name: AWS_SECRET_ACCESS_KEY
  valueFrom:
    secretKeyRef:
      name: {{ .Values.filestore.existingSecret }}
      key: {{ .Values.filestore.secretAccessKeyKey | default "AWS_SECRET_ACCESS_KEY" }}
{{- end }}
{{- else }}
- name: FILE_STORE
  value: {{ .Values.filestore.type }}
{{- end }}
{{- if .Values.filestore.provider }}
- name: SHARED_EVENT_STORAGE_PROVIDER
  value: {{ .Values.filestore.provider }}
{{- end }}
{{- if .Values.runtimeFileArchive.enabled }}
{{- $archiveStore := .Values.runtimeFileArchive.storeType | default (ternary "s3" "google_cloud" .Values.filestore.ephemeral) }}
# Archive a sandbox's workspace before an explicit delete. The s3 store reuses
# the AWS_S3_*/AWS_*_KEY connection env: with filestore.ephemeral it is the
# in-cluster minio set above; on a non-ephemeral external-S3 store the operator
# supplies it through the pod's normal AWS credential mechanism (IRSA, a mounted
# secret, etc.). google_cloud uses the pod ServiceAccount's Workload Identity.
# See values.runtimeFileArchive.
- name: RUNTIME_FILE_ARCHIVE_ENABLED
  value: "true"
- name: RUNTIME_FILE_ARCHIVE_STORE_TYPE
  value: {{ $archiveStore | quote }}
- name: RUNTIME_FILE_ARCHIVE_BUCKET
  value: {{ .Values.runtimeFileArchive.bucket | quote }}
- name: RUNTIME_FILE_ARCHIVE_PREFIX
  value: {{ .Values.runtimeFileArchive.prefix | default "workspace-archives" | quote }}
- name: RUNTIME_FILE_ARCHIVE_PATH
  value: {{ .Values.runtimeFileArchive.path | default "/workspace/project" | quote }}
- name: RUNTIME_FILE_ARCHIVE_FORMAT
  value: {{ .Values.runtimeFileArchive.format | default "both" | quote }}
- name: RUNTIME_FILE_ARCHIVE_REQUIRED
  value: {{ .Values.runtimeFileArchive.required | default false | quote }}
{{- if .Values.runtimeFileArchive.initial.enabled }}
# Also snapshot the INITIAL workspace (repo as cloned, before setup.sh) — the
# eval "base" state. Reuses STORE_TYPE/BUCKET/PREFIX above; awaited inline at
# conversation start (bounded by INITIAL_DEADLINE, best-effort).
- name: RUNTIME_FILE_ARCHIVE_INITIAL_ENABLED
  value: "true"
- name: RUNTIME_FILE_ARCHIVE_INITIAL_FORMAT
  value: {{ .Values.runtimeFileArchive.initial.format | default "tar.gz" | quote }}
- name: RUNTIME_FILE_ARCHIVE_INITIAL_DEADLINE
  value: {{ .Values.runtimeFileArchive.initial.deadline | default 120 | quote }}
{{- end }}
{{- end }}
{{- if .Values.runtime.runAsRoot }}
- name: SANDBOX_USER_ID
  value: '0'
- name: RUN_AS_OPENHANDS
  value: 'false'
{{- else }}
- name: SANDBOX_USER_ID
  value: '1000'
- name: RUN_AS_OPENHANDS
  value: 'true'
{{- end }}
- name: NO_SETUP
  value: 'true'
- name: AGENT_SERVER_IMAGE_REPOSITORY
  value: "{{ .Values.runtime.image.repository | default .Values.global.agentServerImage.repository }}"
- name: AGENT_SERVER_IMAGE_TAG
  value: "{{ .Values.runtime.image.tag | default .Values.global.agentServerImage.tag }}"
- name: SANDBOX_REMOTE_RUNTIME_API_URL
  value: {{ .Values.sandbox.apiHostname }}
- name: SANDBOX_API_KEY
  valueFrom:
    secretKeyRef:
      name: sandbox-api-key
      key: sandbox-api-key
{{- if .Values.sessions.existingSecret }}
- name: JWT_SECRET
  valueFrom:
    secretKeyRef:
      name: {{ .Values.sessions.existingSecret }}
      key: jwt-secret
{{- end }}
{{- if .Values.allowedUsers }}
- name: GITHUB_USER_LIST_FILE
  value: /app/user-waitlist/user-waitlist.txt
{{- end }}
{{- if .Values.allowedUsersSheet }}
- name: GITHUB_USERS_SHEET_ID
  value: {{ .Values.allowedUsersSheet }}
{{- end }}
{{- if .Values.redis.enabled }}
- name: REDIS_HOST
  value: {{ .Release.Name }}-redis-master
- name: REDIS_PORT
  value: "6379"
- name: REDIS_PASSWORD
  valueFrom:
    secretKeyRef:
      name: {{ .Values.redis.auth.existingSecret }}
      key: redis-password
{{- end }}
- name: KEYCLOAK_SERVER_URL
  value: {{ .Values.keycloak.url }}
- name: KEYCLOAK_REALM_NAME
  valueFrom:
    secretKeyRef:
      name: keycloak-realm
      key: realm-name
- name: KEYCLOAK_CLIENT_ID
  valueFrom:
    secretKeyRef:
      name: keycloak-realm
      key: client-id
- name: KEYCLOAK_CLIENT_SECRET
  valueFrom:
    secretKeyRef:
      name: keycloak-realm
      key: client-secret
- name: KEYCLOAK_SMTP_PASSWORD
  valueFrom:
    secretKeyRef:
      name: keycloak-realm
      key: smtp-password
- name: KEYCLOAK_ADMIN_PASSWORD
  valueFrom:
    secretKeyRef:
      name: keycloak-admin
      key: admin-password
{{- if .Values.github.enabled }}
- name: GITHUB_APP_PRIVATE_KEY
  valueFrom:
    secretKeyRef:
      name: github-app
      key: private-key
- name: GITHUB_APP_WEBHOOK_SECRET
  valueFrom:
    secretKeyRef:
      name: github-app
      key: webhook-secret
- name: GITHUB_APP_ID
  valueFrom:
    secretKeyRef:
      name: github-app
      key: app-id
- name: GITHUB_APP_CLIENT_ID
  valueFrom:
    secretKeyRef:
      name: github-app
      key: client-id
- name: GITHUB_APP_CLIENT_SECRET
  valueFrom:
    secretKeyRef:
      name: github-app
      key: client-secret
