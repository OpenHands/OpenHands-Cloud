  # resolvable from sandboxes that run in a separate namespace. No-op for
  # same-namespace installs.
  value: http://{{ .Release.Name }}-litellm.{{ .Release.Namespace }}.svc.cluster.local:4000
{{- else }}
- name: LITE_LLM_API_URL
