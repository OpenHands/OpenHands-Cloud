{{- if .Values.gitlab.enabled }}
{{- $providers = append $providers "gitlab" }}
{{- end }}
{{- if .Values.bitbucket.enabled }}
{{- $providers = append $providers "bitbucket" }}
{{- end }}
{{- if .Values.bitbucketDataCenter.enabled }}
{{- $providers = append $providers "bitbucket_data_center" }}
{{- end }}
{{- if .Values.enterpriseSSO.enabled }}
{{- $providers = append $providers "enterprise_sso" }}
{{- end }}
{{- if $providers }}
- name: OH_WEB_CLIENT_PROVIDERS_CONFIGURED
  value: {{ $providers | toJson | quote }}
{{- end }}
- name: OH_APP_MODE
  value: "saas"
- name: OH_APP_CONVERSATION_INFO_KIND
  value: server.utils.saas_app_conversation_info_injector.SaasAppConversationInfoServiceInjector
- name: CONVERSATION_MANAGER_CLASS
  value: server.saas_nested_conversation_manager.SaasNestedConversationManager
{{- if (index .Values "plugin-directory").enabled }}
