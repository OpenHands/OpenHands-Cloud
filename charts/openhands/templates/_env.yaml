- name: OH_APP_MODE
  value: "saas"
# OHE is always self-hosted; pin it so deployment_mode isn't host-inferred.
- name: OH_DEPLOYMENT_MODE
  value: "self_hosted"
# OH_APP_CONVERSATION_INFO_KIND / OH_LLM_MODEL_KIND are baked into the enterprise
# image (OpenHands#14811), so the chart no longer sets them — keeps the two in sync.
- name: CONVERSATION_MANAGER_CLASS
  value: server.saas_nested_conversation_manager.SaasNestedConversationManager
{{- if (index .Values "plugin-directory").enabled }}
- name: PLUGIN_DIRECTORY_HOST
  value: {{ (index .Values "plugin-directory").appUrl | quote }}
- name: PLUGIN_DIRECTORY_CLIENT_SECRET
  valueFrom:
    secretKeyRef:
      name: {{ (index .Values "plugin-directory").oidc.realmSecretName }}
      key: {{ (index .Values "plugin-directory").oidc.clientSecretKey }}
{{- else }}
# Empty values for Keycloak envsubst when plugin-directory is disabled
- name: PLUGIN_DIRECTORY_HOST
  value: ""
- name: PLUGIN_DIRECTORY_CLIENT_SECRET
  value: ""
{{- end }}
{{- end }}

{{/*
  openhands.env — Deduplicated environment variable list.

  This wrapper renders the default env vars from "openhands.env.defaults",
  then removes any entries whose name conflicts with a key in .Values.env,
  and finally appends the .Values.env overrides. The result is a clean list
  with no duplicate names, which prevents:
    - Helm warnings about duplicate env vars
    - Strategic Merge Patch conflicts during helm upgrade
      ("The order in patch list doesn't match $setElementOrder list")

  How it works:
    1. Render "openhands.env.defaults" via include (evaluates all conditionals)
    2. Parse the rendered YAML list into Go objects with fromYamlArray
       (handles both "value:" and "valueFrom:" entries transparently)
    3. Filter out any default entries whose name appears in .Values.env
    4. Append .Values.env entries (user overrides always win)
    5. Re-render the deduplicated list with toYaml

  Note: The fromYamlArray/toYaml round-trip may normalize formatting
  (e.g., comment removal, quote style changes). This is cosmetic only
  and does not affect Kubernetes behavior.
*/}}
{{- define "openhands.env" }}
{{- $defaults := include "openhands.env.defaults" . | fromYamlArray }}
{{- /*
    Effective env-var overrides. Start from .Values.env, then fold the
    structured agent-server env map into OH_AGENT_SERVER_ENV: the map is
    merged on top of any JSON string already present at
    .Values.env.OH_AGENT_SERVER_ENV and re-serialised to JSON. This lets callers
    (e.g. replicated/openhands.yaml) assemble OH_AGENT_SERVER_ENV from a
    recursively-merged map of individual keys instead of repeating a hand-written
    JSON blob in every optionalValues block. The map lives at
    .Values.global.agentServerEnv so the runtime-api subchart can mirror the
    same keys into the warm-runtime env (exact-env matching); the legacy
    .Values.agentServerEnv is still merged on top for compatibility. When both
    are empty, .Values.env passes through unchanged.
   */}}
{{- $envOverrides := .Values.env | default dict }}
{{- $agentServerEnv := dict }}
{{- if .Values.global }}
{{- $agentServerEnv = deepCopy ((get .Values.global "agentServerEnv") | default dict) }}
{{- end }}
{{- $agentServerEnv = mergeOverwrite $agentServerEnv (deepCopy (.Values.agentServerEnv | default dict)) }}
{{- if $agentServerEnv }}
{{- $envOverrides = deepCopy $envOverrides }}
{{- $base := dict }}
{{- with (get $envOverrides "OH_AGENT_SERVER_ENV") }}
{{- $base = mustFromJson (. | toString) }}
{{- end }}
{{- $_ := set $envOverrides "OH_AGENT_SERVER_ENV" (mustToJson (mergeOverwrite $base $agentServerEnv)) }}
{{- end }}
{{- /* Build a lookup dict of override keys for O(1) membership checks */}}
{{- $overrideKeys := dict }}
{{- range $key, $_ := $envOverrides }}
{{- $_ := set $overrideKeys $key true }}
{{- end }}
{{- /* Keep only default entries that are NOT overridden by the effective overrides */}}
{{- $filtered := list }}
{{- range $entry := $defaults }}
{{- if not (hasKey $overrideKeys (get $entry "name")) }}
{{- $filtered = append $filtered $entry }}
{{- end }}
{{- end }}
{{- /* Append overrides (these take precedence) */}}
{{- range $key, $value := $envOverrides }}
{{- $filtered = append $filtered (dict "name" $key "value" ($value | toString)) }}
{{- end }}
{{- $filtered | toYaml }}
{{- end }}
