{{- define "troubleshoot.supportBundle" -}}
apiVersion: troubleshoot.sh/v1beta2
kind: SupportBundle
metadata:
  name: {{ .Release.Name }}-support-bundle
spec:
  collectors: {{- include "troubleshoot.collectors.shared" .  | nindent 4 }}
    - secret:
        name: postgres-password
        namespace: {{ .Release.Namespace }}
        key: postgres-password
        includeValue: false
    - secret:
        name: redis
        namespace: {{ .Release.Namespace }}
        key: redis-password
        includeValue: false
    - secret:
        name: sandbox-api-key
        namespace: {{ .Release.Namespace }}
        key: sandbox-api-key
        includeValue: false
    - secret:
        name: github-app
        namespace: {{ .Release.Namespace }}
        includeValue: false
    - secret:
        name: keycloak-realm
        namespace: {{ .Release.Namespace }}
        includeValue: false
    # OpenHands main application logs
    - logs:
        name: app/openhands/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app=openhands
        limits:
          maxAge: 720h
    # OpenHands integrations deployment logs
    - logs:
        name: app/openhands-integrations/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app=openhands-integrations
        limits:
          maxAge: 720h
    # OpenHands MCP deployment logs
    - logs:
        name: app/openhands-mcp/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app=openhands-mcp
        limits:
          maxAge: 720h
    {{- if .Values.postgresql.enabled }}
    # PostgreSQL logs (Bitnami chart)
    - logs:
        name: app/{{ .Release.Name }}-postgresql/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app.kubernetes.io/name=postgresql
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    {{- end }}
    {{- if .Values.redis.enabled }}
    # Redis logs (Bitnami chart)
    - logs:
        name: app/{{ .Release.Name }}-redis/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app.kubernetes.io/name=redis
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    {{- end }}
    {{- if .Values.keycloak.enabled }}
    # Keycloak logs (Bitnami chart)
    - logs:
        name: app/{{ .Release.Name }}-keycloak/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app.kubernetes.io/name=keycloak
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    {{- end }}
    {{- if .Values.filestore.ephemeral }}
    # MinIO logs (MinIO chart)
    - logs:
        name: app/{{ .Release.Name }}-minio/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app=minio
          - release={{ .Release.Name }}
        limits:
          maxAge: 168h
    {{- end }}
    {{- if index .Values "runtime-api" "enabled" }}
    # Runtime API logs
    - logs:
        name: app/{{ .Release.Name }}-runtime-api/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app.kubernetes.io/name=runtime-api
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    # Runtime sandbox pod logs. Pod names are dynamic (runtime-*) and the
    # logs collector has no glob-name support, so select by the runtime_id
    # label — a bare key matches "label exists with any value". Pod/event
    # metadata is already captured by the top-level clusterResources collector.
    - logs:
        name: runtime-sandboxes/logs
        selector:
          - runtime_id
        limits:
          maxAge: 168h
        timestamps: true
    {{- end }}
    {{- if and (index .Values "litellm-helm") (index .Values "litellm-helm" "enabled") }}
    # LiteLLM logs
    - logs:
        name: app/{{ .Release.Name }}-litellm/logs
        namespace: {{ .Release.Namespace }}
        selector:
          - app.kubernetes.io/name=litellm
          - app.kubernetes.io/instance={{ .Release.Name }}
        limits:
          maxAge: 168h
    {{- end }}
    # Ingress NGINX controller logs
    - logs:
        name: ingress-nginx/logs
        selector:
          - app.kubernetes.io/name=ingress-nginx
        namespace: ingress-nginx
        limits:
          maxAge: 168h
    {{- if and .Values.postgresql.enabled .Values.replicated.enabled }}
    - postgresql:
        collectorName: postgresql
        uri: postgresql://{{ .Values.replicated.postgresUsername | urlquery }}:{{ .Values.replicated.postgresPassword | urlquery }}@{{ .Release.Name }}-postgresql.{{ .Release.Namespace }}.svc.cluster.local:5432/{{ .Values.replicated.postgresDatabase }}?sslmode=disable
        tls:
          disabled: true
    {{- end }}
    {{- if and .Values.redis.enabled .Values.replicated.enabled }}
    - redis:
        collectorName: redis
        uri: redis://default:{{ .Values.replicated.redisPassword | urlquery }}@{{ .Release.Name }}-redis-master.{{ .Release.Namespace }}.svc.cluster.local:6379
    {{- end }}
  analyzers: {{- include "troubleshoot.analyzers.shared" .  | nindent 4 }}
    - deploymentStatus:
        name: openhands
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands main deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands main deployment is ready"
    - deploymentStatus:
        name: openhands-integrations
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands integrations deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands integrations deployment is ready"
    - deploymentStatus:
        name: openhands-mcp
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands MCP deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands MCP deployment is ready"
    {{- if and (index .Values "litellm-helm") (index .Values "litellm-helm" "enabled") }}
    - deploymentStatus:
        name: {{ .Release.Name }}-litellm
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands LiteLLM deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands LiteLLM deployment is ready"
    {{- end }}
    {{- if .Values.filestore.ephemeral }}
    - deploymentStatus:
        name: {{ .Release.Name }}-minio
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands MinIO deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands MinIO deployment is ready"
    {{- end }}
    {{- if index .Values "runtime-api" "enabled" }}
    - deploymentStatus:
        name: {{ .Release.Name }}-runtime-api
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands Runtime API deployment is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands Runtime API deployment is ready"
    {{- end }}
    {{- if .Values.postgresql.enabled }}
    - statefulsetStatus:
        name: {{ .Release.Name }}-postgresql
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands PostgreSQL statefulset is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands PostgreSQL statefulset is ready"
    {{- end }}
    {{- if .Values.redis.enabled }}
    - statefulsetStatus:
        name: {{ .Release.Name }}-redis-master
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands Redis statefulset is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands Redis statefulset is ready"
    {{- end }}
    {{- if .Values.keycloak.enabled }}
    - statefulsetStatus:
        name: keycloak
        namespace: {{ .Release.Namespace }}
        outcomes:
          - fail:
              when: "< 1"
              message: "OpenHands Keycloak statefulset is not ready"
          - pass:
              when: ">= 1"
              message: "OpenHands Keycloak statefulset is ready"
    {{- end }}
    - deploymentStatus:
        name: ingress-nginx-controller
        namespace: ingress-nginx
        outcomes:
          - fail:
              when: "< 1"
              message: "Ingress NGINX controller deployment is not ready"
          - pass:
              when: ">= 1"
              message: "Ingress NGINX controller deployment is ready"
    # No `name` => all-deployments mode: auto-fails any deployment whose ready
    # count doesn't match desired. Named blocks above guard "must exist at all".
    - deploymentStatus:
        namespaces:
          - {{ .Release.Namespace }}
          - ingress-nginx
    - clusterPodStatuses:
        namespaces:
          - {{ .Release.Namespace }}
          - ingress-nginx
        outcomes:
          - fail:
              when: "!= Healthy"
              message: "Pod {{`{{ .Namespace }}/{{ .Name }}`}} is not Healthy: {{`{{ .Status.Reason }}`}}"
    {{- if and .Values.postgresql.enabled .Values.replicated.enabled }}
    - postgresql:
        checkName: "PostgreSQL Database Health"
        collectorName: postgresql
        outcomes:
          - fail:
              when: "connected == false"
              message: "Cannot connect to PostgreSQL database"
          - fail:
              when: "version == \"\""
              message: "PostgreSQL version could not be determined"
          - warn:
              when: "version < 12.0.0"
              message: "PostgreSQL version is older than recommended (12.0.0+)"
          - pass:
              when: "connected == true"
              message: "PostgreSQL database is healthy"
    {{- end }}
    {{- if and .Values.redis.enabled .Values.replicated.enabled }}
    - redis:
        checkName: "Redis Cache Health"
        collectorName: redis
        outcomes:
          - fail:
              when: "connected == false"
              message: "Cannot connect to Redis server"
          - fail:
              when: "version == \"\""
              message: "Redis version could not be determined"
          - warn:
              when: "version < 6.0.0"
              message: "Redis version is older than recommended (6.0.0+)"
          - pass:
              when: "connected == true"
              message: "Redis server is healthy"
    {{- end }}
{{- end -}}
