{{- /*
  Ingress entry for the agent-canvas frontend-only deployment.

  Agent Canvas is mounted under a configurable subpath on a consumer-provided
  host. The frontend bundle is built with the same basename and static-server
  receives the same --base-path.
*/}}
{{- $agentCanvas := index .Values "agent-canvas" -}}
{{- if and $agentCanvas.enabled $agentCanvas.ingress.enabled }}
{{- $ingress := $agentCanvas.ingress -}}
{{- $host := required "agent-canvas.ingress.host is required when agent-canvas.ingress.enabled is true" $ingress.host -}}
{{- $path := default "/canvas" $ingress.path -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openhands-agent-canvas-ingress
  {{- with $ingress.annotations }}
  annotations:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ default "traefik" $ingress.className }}
  {{- with $ingress.tls }}
  {{- if .enabled }}
  tls:
  - hosts:
    - {{ $host }}
    secretName: {{ required "agent-canvas.ingress.tls.secretName is required when agent-canvas.ingress.tls.enabled is true" .secretName }}
  {{- end }}
  {{- end }}
  rules:
  - host: {{ $host }}
    http:
      paths:
      - path: {{ $path | quote }}
        pathType: Prefix
        backend:
          service:
            name: agent-canvas
            port:
              number: {{ default 8000 (index $agentCanvas "service" "port") }}
{{- end }}
