{{- /*
  Ingress entry for the agent-canvas frontend-only deployment.

  Agent Canvas is mounted under a subpath on the main OpenHands host. The
  frontend bundle is built with the same basename and static-server receives
  the same --base-path, so no dedicated Canvas hostname or TLS secret is
  required.
*/}}
{{- $agentCanvas := index .Values "agent-canvas" -}}
{{- if and $agentCanvas.enabled $agentCanvas.ingress.enabled }}
{{- $host := .Values.ingress.host -}}
{{- if .Values.ingress.prefixWithBranch -}}
{{- $host = printf "%s.%s" .Values.branchSanitized .Values.ingress.host -}}
{{- end -}}
{{- $path := default "/canvas" $agentCanvas.ingress.path -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openhands-agent-canvas-ingress
  annotations:
    {{- if .Values.ingress.root.annotations }}
    {{ .Values.ingress.root.annotations | toYaml | nindent 4 }}
    {{- else }}
    {{ .Values.ingress.annotations | toYaml | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ default "traefik" .Values.ingress.class }}
  {{- if .Values.tls.enabled }}
  tls:
  - hosts:
    - {{ $host }}
    secretName: app-all-hands-{{ .Values.tls.env }}-tls
  {{- end }}
  rules:
  - host: {{ $host }}
    http:
      paths:
      - path: {{ $path | quote }}
        pathType: Prefix
        backend:
          service:
            name: agent-canvas
            port:
              number: {{ default 8000 (index $agentCanvas "service" "port") }}
{{- end }}
