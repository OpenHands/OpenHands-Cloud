{{- if and .Values.ingress.enabled .Values.automation.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: openhands-automation-ingress
  annotations:
    {{- if .Values.ingress.root.annotations }}
    {{ .Values.ingress.root.annotations | toYaml | nindent 4 }}
    {{- else }}
    {{ .Values.ingress.annotations | toYaml | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.class }}
  {{- if .Values.tls.enabled }}
  tls:
  - hosts:
    {{- if .Values.ingress.prefixWithBranch }}
    - {{ .Values.branchSanitized }}.{{ .Values.ingress.host }}
    {{- else }}
    - {{ .Values.ingress.host }}
    {{- end }}
    secretName: app-all-hands-{{ .Values.tls.env }}-tls
  {{- end }}
  rules:
  {{- if .Values.ingress.prefixWithBranch }}
  - host: {{ .Values.branchSanitized }}.{{ .Values.ingress.host }}
  {{- else }}
  - host: {{ .Values.ingress.host }}
  {{- end }}
    http:
      paths:
      {{- if .Values.automation.events.enabled }}
      # Route webhook events to dedicated events pods
      # IMPORTANT: This more specific path must come before the general /api/automation path
      - path: /api/automation/v1/events
        pathType: Prefix
        backend:
          service:
            name: automation-events
            port:
              number: 80
      {{- end }}
      - path: /api/automation
        pathType: Prefix
        backend:
          service:
            name: automation
            port:
              number: 80
      - path: /automations
        pathType: Prefix
        backend:
          service:
            name: automation
            port:
              number: 80
{{- end }}
