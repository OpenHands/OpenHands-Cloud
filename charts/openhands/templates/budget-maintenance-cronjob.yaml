{{- if and .Values.enabled .Values.budgetMaintenance.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ .Release.Name }}-budget-maintenance
  labels:
    app: {{ .Release.Name }}-budget-maintenance
spec:
  schedule: {{ .Values.budgetMaintenance.schedule | quote }}
  concurrencyPolicy: {{ .Values.budgetMaintenance.concurrencyPolicy }}
  failedJobsHistoryLimit: {{ .Values.budgetMaintenance.failedJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ .Values.budgetMaintenance.successfulJobsHistoryLimit }}
  jobTemplate:
    spec:
      backoffLimit: {{ .Values.budgetMaintenance.backoffLimit }}
      ttlSecondsAfterFinished: 3600
      template:
        metadata:
          name: budget-maintenance
          labels:
            app: {{ .Release.Name }}-budget-maintenance
        spec:
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          serviceAccountName: {{ .Values.serviceAccount.name }}
          restartPolicy: Never
          {{- with .Values.imagePullSecrets }}
          imagePullSecrets:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.caBundle.enabled }}
          volumes:
            {{- include "openhands.caBundle.volume" . | nindent 12 }}
          {{- end }}
          containers:
            - name: budget-maintenance
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
              command: ["/bin/sh", "-c"]
              workingDir: /app
              args:
                - |
                  echo "Running budget maintenance..."
                  python -m enterprise.run_budget_maintenance
              {{- if .Values.caBundle.enabled }}
              volumeMounts:
                {{- include "openhands.caBundle.volumeMount" . | nindent 16 }}
              {{- end }}
              env:
                {{- include "openhands.env" . | nindent 16 }}
                {{- include "openhands.caBundle.env" . | nindent 16 }}
              resources:
                {{- toYaml .Values.budgetMaintenance.resources | nindent 16 }}
{{- end }}
