{{- if .Values.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openhands
  labels:
    {{- include "openhands.labels" . | nindent 4 }}
    app.kubernetes.io/component: server
    app: openhands
spec:
  replicas: {{ .Values.deployment.replicas }}
  selector:
    matchLabels:
      app: openhands
  template:
    metadata:
      labels:
        {{- include "openhands.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: server
        app: openhands
      annotations:
        {{- if (include "openhands.keycloakProvisionRealm" .) }}
        checksum/keycloak-config: {{ include (print $.Template.BasePath "/keycloak-config-script.yaml") . | sha256sum }}
        checksum/keycloak-realm-template: {{ include (print $.Template.BasePath "/keycloak-realm-template.yaml") . | sha256sum }}
        {{- end }}
        checksum/litellm-config: {{ include (print $.Template.BasePath "/litellm-config-script.yaml") . | sha256sum }}
        {{- if .Values.allowedUsers }}
        checksum/user-waitlist: {{ include (print $.Template.BasePath "/user-waitlist-configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.secretsChecksum }}
        checksum/config-secrets: {{ .Values.secretsChecksum | quote }}
        {{- end }}
        {{- include "openhands.caBundle.checksumAnnotation" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        {{- include "openhands.caBundle.volume" . | nindent 8 }}
        {{- if .Values.allowedUsers }}
        - name: user-waitlist
          configMap:
            name: user-waitlist
        {{- end }}
        {{- if (include "openhands.keycloakProvisionRealm" .) }}
        - name: keycloak-config-script
          configMap:
            name: keycloak-config-script
            defaultMode: 0755
        - name: keycloak-realm-template
          configMap:
            name: keycloak-realm-template
        {{- end }}
        - name: litellm-config-script
          configMap:
            name: litellm-config-script
            defaultMode: 0755
      initContainers:
      {{- include "openhands.dbInitContainers" . | nindent 6 }}
      {{- if (include "openhands.keycloakProvisionRealm" .) }}
      - name: keycloak-config
        imagePullPolicy: Always
        image: '{{.Values.image.repository}}:{{.Values.image.tag | default .Chart.AppVersion }}'
        env:
        {{- include "openhands.env" . | nindent 8 }}
        volumeMounts:
        - name: keycloak-config-script
          mountPath: /scripts
        - name: keycloak-realm-template
          mountPath: /realm-template
        command:
          - sh
          - /scripts/keycloak-config.sh
      {{- end }}
      - name: litellm-config
        imagePullPolicy: Always
        image: '{{.Values.image.repository}}:{{.Values.image.tag | default .Chart.AppVersion }}'
        env:
        {{- include "openhands.env" . | nindent 8 }}
        volumeMounts:
          - name: litellm-config-script
            mountPath: /scripts
        command:
          - sh
          - /scripts/litellm-config.sh
      containers:
      - name: openhands
        imagePullPolicy: Always
        image: '{{.Values.image.repository}}:{{.Values.image.tag | default .Chart.AppVersion }}'
        command: ["/bin/sh"]
        args:
          - "-c"
          - "exec {{- if .Values.datadog.enabled }} ddtrace-run {{- end }} uvicorn saas_server:app --host 0.0.0.0 --port 3000 --workers {{ .Values.uvicorn.workers }}"
        ports:
        - containerPort: 3000
        resources:
          {{- toYaml .Values.deployment.resources | nindent 12 }}
        startupProbe:
          httpGet:
            path: /health
            port: 3000
          failureThreshold: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
          {{- include "openhands.caBundle.volumeMount" . | nindent 10 }}
          {{- if .Values.allowedUsers }}
          - name: user-waitlist
            mountPath: /app/user-waitlist
          {{- end }}
        env:
        {{- include "openhands.env" . | nindent 8 }}
        {{- include "openhands.caBundle.env" . | nindent 8 }}
{{- end }}
