{{- define "automation.env.defaults" }}
# OpenHands API base URL (for dispatching sandbox runs)
{{- if .Values.openhandsApiUrl }}
- name: AUTOMATION_OPENHANDS_API_BASE_URL
  value: {{ .Values.openhandsApiUrl | quote }}
{{- end }}
# Automation service base URL (for completion callbacks from sandboxes)
{{- if .Values.automationBaseUrl }}
- name: AUTOMATION_BASE_URL
  value: {{ .Values.automationBaseUrl | quote }}
{{- end }}
# PostgreSQL database configuration
- name: AUTOMATION_DB_HOST
  value: {{ .Values.database.host | quote }}
- name: AUTOMATION_DB_PORT
  value: {{ .Values.database.port | quote }}
- name: AUTOMATION_DB_SSL_MODE
  value: {{ .Values.database.sslMode | default "prefer" | quote }}
- name: PGSSLMODE
  value: {{ .Values.database.sslMode | default "prefer" | quote }}
- name: AUTOMATION_DB_USER
  value: {{ .Values.database.user | quote }}
- name: AUTOMATION_DB_NAME
  value: {{ .Values.database.name | quote }}
- name: AUTOMATION_DB_PASS
  valueFrom:
    secretKeyRef:
      name: {{ .Values.database.secretName }}
      key: {{ .Values.database.secretKey }}
{{- if .Values.gcp.dbInstance }}
- name: AUTOMATION_GCP_DB_INSTANCE
  value: {{ .Values.gcp.dbInstance | quote }}
- name: AUTOMATION_GCP_PROJECT
  value: {{ .Values.gcp.project | quote }}
- name: AUTOMATION_GCP_REGION
  value: {{ .Values.gcp.region | quote }}
{{- end }}
# File storage configuration
- name: FILE_STORE_PATH
  value: {{ .Values.filestore.bucket }}
{{- if .Values.filestore.ephemeral }}
# Ephemeral mode: use S3-compatible storage (minio)
- name: FILE_STORE
  value: s3
{{- if .Values.minio.enabled }}
# Using deployed minio subchart
- name: AWS_ACCESS_KEY_ID
  value: {{ (index .Values.minio.svcaccts 0).accessKey }}
- name: AWS_SECRET_ACCESS_KEY
  value: {{ (index .Values.minio.svcaccts 0).secretKey }}
- name: AWS_S3_ENDPOINT
  value: {{ printf "http://%s-minio:9000" .Release.Name }}
{{- else }}
# Using external minio (e.g., parent chart's minio instance)
- name: AWS_ACCESS_KEY_ID
  value: {{ .Values.minio.external.accessKey }}
- name: AWS_SECRET_ACCESS_KEY
  value: {{ .Values.minio.external.secretKey }}
- name: AWS_S3_ENDPOINT
  value: {{ .Values.minio.external.endpoint }}
{{- end }}
- name: AWS_S3_BUCKET
  value: {{ .Values.filestore.bucket }}
- name: AWS_S3_SECURE
  value: "false"
{{- else }}
# Production mode: use cloud storage (gcs, s3, etc.)
- name: FILE_STORE
  value: {{ .Values.filestore.type }}
{{- end }}
# Admin API key for issuing per-user automation API keys
{{- if .Values.adminApiKeyFromSecret }}
- name: AUTOMATION_ADMIN_API_KEY
  valueFrom:
    secretKeyRef:
      name: {{ .Values.adminApiKeyFromSecret.name }}
      key: {{ .Values.adminApiKeyFromSecret.key }}
{{- end }}
# Service key for authenticating requests from OpenHands SaaS
{{- if .Values.serviceKeyFromSecret }}
- name: AUTOMATION_SERVICE_KEY
  valueFrom:
    secretKeyRef:
      name: {{ .Values.serviceKeyFromSecret.name }}
      key: {{ .Values.serviceKeyFromSecret.key }}
{{- end }}
# Automation webhook secret for verifying webhook signatures
{{- if .Values.automationWebhookSecretFromSecret }}
- name: AUTOMATION_WEBHOOK_SECRET
  valueFrom:
    secretKeyRef:
      name: {{ .Values.automationWebhookSecretFromSecret.name }}
      key: {{ .Values.automationWebhookSecretFromSecret.key }}
{{- end }}
# Laminar (Laminar) monitoring/analytics
{{- if .Values.lmnrApiKeyFromSecret }}
- name: LMNR_PROJECT_API_KEY
  valueFrom:
    secretKeyRef:
      name: {{ .Values.lmnrApiKeyFromSecret.name }}
      key: {{ .Values.lmnrApiKeyFromSecret.key }}
      optional: true
{{- end }}
{{- if .Values.lmnrBaseUrlFromSecret }}
- name: LMNR_BASE_URL
  valueFrom:
    secretKeyRef:
      name: {{ .Values.lmnrBaseUrlFromSecret.name }}
      key: {{ .Values.lmnrBaseUrlFromSecret.key }}
      optional: true
{{- end }}
{{- if .Values.lmnrForceHttp }}
- name: LMNR_FORCE_HTTP
  value: {{ .Values.lmnrForceHttp | quote }}
{{- end }}
# Datadog configuration
- name: DD_AGENT_HOST
  value: "datadog-agent.all-hands-system.svc.cluster.local"
- name: DD_TRACE_AGENT_PORT
  value: "8126"
- name: DD_SERVICE
  value: "automation"
- name: DD_ENV
  value: {{ .Values.datadog.env | quote }}
- name: DD_TRACE_ENABLED
  value: "true"
{{- end }}

{{/*
  automation.env — Deduplicated environment variable list.

  This wrapper renders the default env vars from "automation.env.defaults",
  then removes any entries whose name conflicts with a key in .Values.env,
  and finally appends the .Values.env overrides. The result is a clean list
  with no duplicate names, which prevents:
    - Helm warnings about duplicate env vars
    - Strategic Merge Patch conflicts during helm upgrade
      ("The order in patch list doesn't match $setElementOrder list")

  How it works:
    1. Render "automation.env.defaults" via include (evaluates all conditionals)
    2. Parse the rendered YAML list into Go objects with fromYamlArray
    3. Filter out any default entries whose name appears in .Values.env
    4. Append .Values.env entries (user overrides always win)
    5. Re-render the deduplicated list with toYaml
*/}}
{{- define "automation.env" }}
{{- $defaults := include "automation.env.defaults" . | fromYamlArray }}
{{- /* Build a lookup dict of override keys for O(1) membership checks */}}
{{- $overrideKeys := dict }}
{{- if .Values.env }}
{{- range $key, $_ := .Values.env }}
{{- $_ := set $overrideKeys $key true }}
{{- end }}
{{- end }}
{{- /* Keep only default entries that are NOT overridden by .Values.env */}}
{{- $filtered := list }}
{{- range $entry := $defaults }}
{{- if not (hasKey $overrideKeys (get $entry "name")) }}
{{- $filtered = append $filtered $entry }}
{{- end }}
{{- end }}
{{- /* Append user overrides from .Values.env (these take precedence) */}}
{{- if .Values.env }}
{{- range $key, $value := .Values.env }}
{{- $filtered = append $filtered (dict "name" $key "value" ($value | toString)) }}
{{- end }}
{{- end }}
{{- $filtered | toYaml }}
{{- end }}
