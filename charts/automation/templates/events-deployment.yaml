{{- if .Values.events.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: automation-events
  labels:
    app: automation-events
spec:
  replicas: {{ .Values.events.deployment.replicas }}
  selector:
    matchLabels:
      app: automation-events
  template:
    metadata:
      labels:
        app: automation-events
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      - name: migrate
        image: '{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}'
        command: ["alembic", "upgrade", "head"]
        env:
        {{- include "automation.env" . | nindent 8 }}
      containers:
      - name: automation-events
        imagePullPolicy: Always
        image: '{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}'
        command: ["ddtrace-run"]
        args:
          - "uvicorn"
          - "openhands.automation.app:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8000"
          - "--workers"
          - "{{ .Values.events.uvicorn.workers | default 2 }}"
        ports:
        - containerPort: 8000
        resources:
          {{- toYaml .Values.events.deployment.resources | nindent 12 }}
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          periodSeconds: {{ .Values.probes.startup.periodSeconds }}
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
          periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
        env:
        {{- include "automation.env" . | nindent 8 }}
{{- end }}
