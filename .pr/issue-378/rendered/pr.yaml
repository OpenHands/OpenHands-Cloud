---
# Source: integrations-hub/templates/service-account.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: integrations-hub-sa
  labels:
    app: integrations-hub
---
# Source: integrations-hub/templates/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: integrations-hub
  labels:
    app: integrations-hub
spec:
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: integrations-hub
---
# Source: integrations-hub/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: integrations-hub
  labels:
    app: integrations-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: integrations-hub
  template:
    metadata:
      labels:
        app: integrations-hub
    spec:
      serviceAccountName: integrations-hub-sa
      securityContext:
        runAsGroup: 42420
        runAsNonRoot: true
        runAsUser: 42420
      initContainers:
      # Run database migrations before starting the main container
      - name: migrate
        image: 'localhost:5001/integrations-hub:evidence-6dd4851'
        workingDir: /app/backend
        command: ["alembic", "upgrade", "head"]
        env:
        - name: INTHUB_DB_HOST
          value: postgres
        - name: INTHUB_DB_PORT
          value: "5432"
        - name: INTHUB_DB_SSL_MODE
          value: disable
        - name: PGSSLMODE
          value: disable
        - name: INTHUB_DB_USER
          value: integrations_hub_user
        - name: INTHUB_DB_NAME
          value: integrations_hub
        - name: INTHUB_DB_PASS
          valueFrom:
            secretKeyRef:
              key: db-password
              name: integrations-hub-db-secret
        - name: INTHUB_POSTGRES_URL
          value: postgresql://$(INTHUB_DB_USER):$(INTHUB_DB_PASS)@$(INTHUB_DB_HOST):$(INTHUB_DB_PORT)/$(INTHUB_DB_NAME)?sslmode=$(INTHUB_DB_SSL_MODE)
        - name: INTHUB_OPENHANDS_AUTH_COOKIE_NAME
          value: keycloak_auth
        - name: INTHUB_DISABLE_AUTH
          value: "true"
        - name: INTHUB_ROOT_PATH
          value: /integrations-hub
        - name: INTHUB_CREDENTIAL_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              key: encryption-key
              name: integrations-hub-encryption-secret
        - name: INTHUB_APP_ADMIN_EMAILS
          value: chuck@openhands.dev,chuck@all-hands.dev,graham@openhands.dev,graham@all-hands.dev
        - name: INTHUB_CRON_SECRET
          valueFrom:
            secretKeyRef:
              key: cron-secret
              name: integrations-hub-cron-secret
        - name: DD_AGENT_HOST
          value: datadog-agent.all-hands-system.svc.cluster.local
        - name: DD_TRACE_AGENT_PORT
          value: "8126"
        - name: DD_DOGSTATSD_PORT
          value: "8125"
        - name: DD_SERVICE
          value: integrations-hub
        - name: DD_ENV
          value: evidence
        - name: DD_VERSION
          value: evidence-6dd4851
        - name: DD_LOGS_INJECTION
          value: "true"
        - name: DD_TRACE_ENABLED
          value: "true"
        - name: DD_TRACE_SAMPLING_RULES
          value: '[{"resource":"GET /api/health","sample_rate":0.0},{"resource":"GET /api/live","sample_rate":0.0},{"resource":"GET
            /api/ready","sample_rate":0.0}]'
        - name: LOG_JSON
          value: "1"
        - name: LOG_JSON_LEVEL_KEY
          value: severity
      containers:
      - name: integrations-hub
        imagePullPolicy: Always
        image: 'localhost:5001/integrations-hub:evidence-6dd4851'
        ports:
        - containerPort: 8000
        resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi
        # Kubelet probes hit the pod directly, before any ingress path rewrite.
        # The FastAPI app registers these health routes at pod-local /api/*
        # paths even when INTHUB_ROOT_PATH is set for external routing.
        # Liveness stays independent of external services, while readiness
        # checks database availability before the pod receives traffic.
        startupProbe:
          httpGet:
            path: "/api/live"
            port: 8000
          failureThreshold: 30
          periodSeconds: 10
          timeoutSeconds: 2
        livenessProbe:
          httpGet:
            path: "/api/live"
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
          timeoutSeconds: 2
        readinessProbe:
          httpGet:
            path: "/api/ready"
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
          timeoutSeconds: 2
        env:
        - name: INTHUB_DB_HOST
          value: postgres
        - name: INTHUB_DB_PORT
          value: "5432"
        - name: INTHUB_DB_SSL_MODE
          value: disable
        - name: PGSSLMODE
          value: disable
        - name: INTHUB_DB_USER
          value: integrations_hub_user
        - name: INTHUB_DB_NAME
          value: integrations_hub
        - name: INTHUB_DB_PASS
          valueFrom:
            secretKeyRef:
              key: db-password
              name: integrations-hub-db-secret
        - name: INTHUB_POSTGRES_URL
          value: postgresql://$(INTHUB_DB_USER):$(INTHUB_DB_PASS)@$(INTHUB_DB_HOST):$(INTHUB_DB_PORT)/$(INTHUB_DB_NAME)?sslmode=$(INTHUB_DB_SSL_MODE)
        - name: INTHUB_OPENHANDS_AUTH_COOKIE_NAME
          value: keycloak_auth
        - name: INTHUB_DISABLE_AUTH
          value: "true"
        - name: INTHUB_ROOT_PATH
          value: /integrations-hub
        - name: INTHUB_CREDENTIAL_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              key: encryption-key
              name: integrations-hub-encryption-secret
        - name: INTHUB_APP_ADMIN_EMAILS
          value: chuck@openhands.dev,chuck@all-hands.dev,graham@openhands.dev,graham@all-hands.dev
        - name: INTHUB_CRON_SECRET
          valueFrom:
            secretKeyRef:
              key: cron-secret
              name: integrations-hub-cron-secret
        - name: DD_AGENT_HOST
          value: datadog-agent.all-hands-system.svc.cluster.local
        - name: DD_TRACE_AGENT_PORT
          value: "8126"
        - name: DD_DOGSTATSD_PORT
          value: "8125"
        - name: DD_SERVICE
          value: integrations-hub
        - name: DD_ENV
          value: evidence
        - name: DD_VERSION
          value: evidence-6dd4851
        - name: DD_LOGS_INJECTION
          value: "true"
        - name: DD_TRACE_ENABLED
          value: "true"
        - name: DD_TRACE_SAMPLING_RULES
          value: '[{"resource":"GET /api/health","sample_rate":0.0},{"resource":"GET /api/live","sample_rate":0.0},{"resource":"GET
            /api/ready","sample_rate":0.0}]'
        - name: LOG_JSON
          value: "1"
        - name: LOG_JSON_LEVEL_KEY
          value: severity
